<style>
body{
    margin:0; background:#222; font-family:sans-serif; display:flex; justify-content:center;
    align-items:center; width:100vw;
    height:100dvh; /* vhをやめdvhにすることでスマホ横持ち時の余白問題を調整 */
    overflow:hidden;
    touch-action:none; /* キーパッドのスマホ誤作動対策でブラウザ標準機能をOFF */
}
#game{width:854px;height:480px;background:#ddd;display:grid;grid-template-columns:140px 574px 140px;grid-template-rows:32px 384px 64px}
#statusBar,#message{ grid-column:1/span 3; background:#333; color:#fff; padding:6px; box-sizing:border-box; }
#message{ text-align:center; } /* 最下部メッセージ */
.stageTitle{ font-weight:bold; font-size:18px; }
#left{ background:#bbb; display:flex; justify-content:center; align-items:center; position:relative; }
#logoBox{ position:absolute; top:12px; left:50%; transform:translateX(-50%); }
#gameLogo{ width:130px; height:auto; }
#timeBox{ position:absolute; top:90px; left:50%; transform:translateX(-50%); width:130px;
	text-align:center; font-size:14px; font-weight:bold; line-height:1.5; color:#222;
}
#right{ background:#bbb; display:flex; justify-content:flex-start; align-items:center; flex-direction:column; gap:6px; }
#filePicker{ width:130px; }
#pad{ display:grid; grid-template-columns:repeat(3,40px); gap:4px; margin-top:60px; }
#canvasWrap{position:relative;width:574px;height:384px}
#cv{ position:absolute; left:0; top:0; }
#miniMap{ border:1px solid #333; background:#000; }
#gridPos{ width:130px; font-size:10px; font-weight:bold; text-align:center; line-height:1.4; }
#gridControls{ display:flex; gap:4px; align-items:center; }
#abButtons{ display:flex; justify-content:center; gap:16px; margin-top:40px; }
#btnA{position:relative;top:-4px;background:#d33;}
#btnB{position:relative;top:4px;background:#36c;}
#btnA,#btnB{
    width:48px; height:48px; border-radius:50%; border:2px solid #fff;
    color:#fff; font-size:28px; font-weight:bold;
}
button{
    border:1px solid #fff; border-radius:8px;
    background:#555; color:#fff;
    font-weight:bold;
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.3),
        0 2px 4px rgba(0,0,0,.4);
    cursor:pointer;
}
button:active{
    transform:translateY(2px);
    box-shadow:
        inset 0 2px 4px rgba(0,0,0,.5);
}
#pad button{ font-size:28px; display:flex; justify-content:center; align-items:center; }
.pad-horizontal{ height:40px; }
#padCenter{ visibility:hidden; }
#dialog{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:none;background:#111;color:#fff;border:2px solid #fff;padding:12px;width:380px}
#loadButtons{ margin-top:6px; text-align:center; display:flex; flex-direction:column; gap:4px; }
/* タッチ要求画面 */
#press-panel{ position:fixed; inset:0; z-index:1002; background:rgba(0,0,0,.5); color:#fff; display:flex; justify-content:center; align-items:center;}
#press-text{ text-align:center; font-size:72px; font-weight:bold; line-height:1.6;animation:pressBlink 2.5s infinite;}
@keyframes pressBlink{
    0%{ opacity:1; }
    50%{ opacity:0.2; }
    100%{ opacity:1; }
}
/* タイトル画面 */
#title-panel{ position:fixed; inset:0; z-index:1001; background:rgba(0,0,0,.85); display:none; flex-direction:column; 
	justify-content:center; align-items:center; gap:24px;}
#title-image{  width:500px; height:auto;}
.modal-button{ padding:12px 32px; font-size:20px; font-weight:bold;}
#start-game-btn{padding:18px 48px;font-size:32px;}
#title-bgm-ctrl{ display:flex; align-items:center; gap:8px; color:#fff;}
.switch{ position:relative; display:inline-block; width:52px; height:28px;}
.switch input{ display:none;}
.slider{ position:absolute; inset:0; background:#666; border-radius:28px;}
.slider::before{ content:""; position:absolute; width:22px; height:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s;}
.switch input:checked + .slider::before{ transform:translateX(24px);}
#hpText{ position:absolute; top:40px; left:25px; color:#000; font-size:16px; font-family:sans-serif; z-index:10; }

<!--
========================================================
ステージデータ定義
========================================================
title          : ステージ名
gameType       : ゲームモード
                 panel     = パネル接合
                 paint     = 塗り絵修復
                 restoring = 接合→修復の2段階
unlockTerm     : ステージ解放条件（省略可）
                 指定したステージ番号をすべてクリアすると解放
                 （※プログラムの都合上、実際のステージより1つ少ない数を指定してください）
                 0-5       = ステージ1～6を全クリア
                 0,2,7     = ステージ1、3、8を全クリア
                 0-3,7,10-12 = 範囲と個別指定の組み合わせ
unlockMsg      : 未解放時にサムネイル下へ表示するメッセージ
bgm            : ステージBGM
bgm2           : restoringモードでの Phase2(paint相当時)用BGM
thumb          : ステージ選択画面でのサムネイル
clearthumb     : クリア後のサムネイル（省略時はthumbを使用します）
pict1          : 裏に隠れている画像（修復後）  jpg/png/gif/mp4動画/webm対応
pict2          : ゲーム開始時の画像（修復対象）jpg/png/gif/webm対応
cols           : グリッド列数
rows           : グリッド行数
startX         : プレイヤーの初期X座標
startY         : プレイヤーの初期Y座標
zoom           : 初期ズーム倍率（MAXで8まで。0.287にすると画像全体をピッタリ表示）
clearRate      : ゴール解放条件を100までの整数で指定。低すぎるとゲーム開始と同時にクリアになるので注意
                 panelモードの場合…使用しません。
                 paintモードの場合…修復率の％
                 restoringモードの場合…フェーズ2(paintモード相当)での修復率の％
maxHp          : プレイヤーの最大HP（初期HPの上限値）
hp             : 現在HP（0になるとゲームオーバー）
goalCondition  : 画面上のミッション表示文字列
endingMessage  : 画面下のステージクリア時メッセージ

events         : イベント一覧
	--------------------------------------------------------
	id                : イベント識別子
	x,y               : ワールド座標
	type              : イベント種別
	                    goal = ゴール
	title             : イベントタイトル
	text              : イベント本文
	hiddenUntilRepair : trueなら修復済みグリッド到達まで非表示

balls          : 反射するボールオブジェクト一覧
                 プレイヤー・壁・パドル・障害物と衝突する危険物
	--------------------------------------------------------
	x                 : ボールの中心部分の開始横座標 0～2000。1000なら画面の横中央
	y                 : ボールの中心部分の開始縦座標 0～1338。669なら画面の縦中央
	vx                : ボールの横方向の速度（x軸）プラス → 右に進む、マイナス → 左に進む
	vy                : ボールの縦方向の速度（y軸）プラス → 下に進む、マイナス → 上に進む
	radius            : ボールの半径 例)15

paddles        : 左右のAIパドル一覧
                 ボールを反射する防御/妨害オブジェクト（自動追尾あり）
	--------------------------------------------------------
	side              : left…画面の左端に表示、right…画面の右端に表示
	y                 : パドルの中心部分の開始縦座標 0～1338。669なら画面の縦中央
	height            : パドルの高さ（長さ） 例)180
	width             : パドルの幅（厚さ） 例)50
	speed             : パドルの動く速度。数字が大きいほど早い 例)6
	targetMode        : ball…近い場所のボールを追跡、player…主人公を追跡

oblongs        : 長方形障害物
                 ボールが触れたときに壊れるか壊れないかの設定が可能
                 プレイヤーが触れても壊れず、触れている間はHPが1つずつ減っていく
	--------------------------------------------------------
	x                 : 長方形障害物の開始横座標 0～2000
	y                 : 長方形障害物の開始縦座標 0～1338
	width             : 長方形障害物の横幅
	height            : 長方形障害物の縦幅
	breakable         : true…ボールが触れると消える(青色)、false…消えない(赤色)

以下のキャラ動作設定はステージごとに任意で設定可。設定がない場合＆ステージ選択画面に戻ると、以下の基本値となる。
playerSpeed = 8;                  // 通常の移動速度
dashMultiplier = 4;               // Bダッシュの倍数
restoreBrushSize = 130;          // 修復筆の太さ
eventDistance = 80;               // イベント当たり判定距離
useCharacterImage=true;          // キャラ画像ON/OFF(true/false)
characterSize=28;                 // キャラ画像サイズ

キャラの横・縦サイズおよび当たり判定は
JSONではなく、ゲーム内部の定数（ゲームバランス設定）で管理しています。
ソースの真ん中あたりにある「ゲームバランス設定」をご覧ください。
-->
<!--
========================================================
Stage Data Definition
========================================================
title             : Stage title
gameType          : Game mode (panel = Panel Assembly / paint = Image Restoration / restoring = Assembly → Restoration)
unlockTerm        : Stage unlock condition (optional)
                    The stage becomes available after all specified stages are cleared.
                    (Note: Due to internal indexing, specify a value that is one less than the actual stage number.)
                    0-5         = Clear stages 1 through 6
                    0,2,7       = Clear stages 1, 3, and 8
                    0-3,7,10-12 = Combination of ranges and individual stages
unlockMsg         : Message displayed below the thumbnail while the stage is locked
bgm               : Stage BGM
bgm2              : BGM used during Phase 2 in restoring mode
thumb             : Thumbnail shown on the stage select screen
clearthumb        : Thumbnail shown after clearing the stage (uses thumb if omitted)
pict1             : Hidden image revealed after restoration (jpg/png/gif/mp4/webm)
pict2             : Initial image to be restored (jpg/png/gif/webm)
cols              : Number of grid columns
rows              : Number of grid rows
startX            : Player's initial X position
startY            : Player's initial Y position
zoom              : Initial zoom level (max 8, use 0.287 to fit the entire image on screen)
clearRate         : Goal unlock condition (0–100)
                    panel     = not used
                    paint     = required restoration percentage
                    restoring = required restoration percentage in Phase 2
goalCondition     : Mission text displayed on screen
endingMessage     : Message shown when the stage is cleared

events            : Event list
	--------------------------------------------------------
	id                : Event identifier
	x, y              : World coordinates
	type              : Event type (goal = Goal)
	title             : Event title
	text              : Event message
	hiddenUntilRepair : Hidden until the corresponding grid area is restored

balls            : List of bouncing ball objects
                   Hazard objects that collide with the player, walls, paddles, and obstacles
	--------------------------------------------------------
	x                : Initial X position of the ball center (world coordinates, 0–2000; 1000 = center)
	y                : Initial Y position of the ball center (world coordinates, 0–1338; 669 = center)
	vx               : Horizontal velocity (x-axis speed; positive = right, negative = left)
	vy               : Vertical velocity (y-axis speed; positive = down, negative = up)
	radius           : Ball radius (e.g., 15)

paddles          : List of AI-controlled paddles (left/right)
                   Defensive/offensive objects that reflect balls (auto-tracking enabled)
	--------------------------------------------------------
	side             : Paddle side (left = left edge, right = right edge)
	y                : Vertical center position of the paddle (0–1338; 669 = center)
	height           : Paddle height (length)
	width            : Paddle width (thickness)
	speed            : Movement speed (higher values = faster movement)
	targetMode       : Tracking mode (ball = follow nearest ball, player = follow player)

oblongs          : Rectangular obstacle objects
                   Obstacles that may be destructible or indestructible
                   Balls can destroy breakable ones, while non-breakable ones remain
                   Player collision does not destroy them; instead, it continuously reduces HP while touching
	--------------------------------------------------------
	x                : X position of the obstacle (0–2000)
	y                : Y position of the obstacle (0–1338)
	width            : Obstacle width
	height           : Obstacle height
	breakable        : true = destroyed when hit by a ball (blue type)
	                   false = indestructible (red type)

The following character behavior settings can be configured individually for each stage.
If a setting is not specified, or when returning to the Stage Select screen,
the default values below will be applied.

playerSpeed = 8;           // Normal movement speed
dashMultiplier = 4;        // B-dash speed multiplier
restoreBrushSize = 130;    // Restoration brush size
eventDistance = 80;        // Event interaction distance
useCharacterImage = true;  // Enable/disable character image
characterSize = 28;        // Character image size

The character’s width, height, and collision hitbox are not defined in JSON.
They are controlled by internal constants (game balance settings).
Please refer to the “Game Balance Settings” section located in the middle of the source code.
========================================================
-->

<script>
let stages;
let zoomFixed=false;
try{
    stages=JSON.parse(
        document.getElementById("stageData").textContent
    );
}catch(err){
    console.error(err);
    alert(
        "stageData JSON Error \n\n"+
        err.message
    );
    throw err;
}
let currentStage=null;
let currentStageIndex=0;

//BGM切替関数
function playStageBGM(stageData){
    let bgmPath;
    if(
        stageData.gameType==="restoring" && repairPhase===2
    ){
        bgmPath = stageData.bgm2 || stageData.bgm || DEFAULT_BGM;
    }else{
        bgmPath = stageData.bgm ||  DEFAULT_BGM;
    }
    if(bgmPlayer.src.endsWith(bgmPath)){
        return;
    }
    bgmPlayer.pause();
    bgmPlayer.src=bgmPath;
    bgmPlayer.load();
    bgmPlayer.play().catch(()=>{});
}
function isTitlePanelOpen(){
    return document.getElementById("title-panel").style.display==="flex";
}
function showTitlePanel(){
    if(pressOpened){
        return;
    }
    pressOpened=true;
    document.getElementById("press-panel").style.display="none";
    document.getElementById("title-panel").style.display="flex";
    playTitleBGM();
}
function playTitleBGM(){
    if(bgmPlayer.src.endsWith(TITLE_BGM)){
        return;
    }
    bgmPlayer.pause();
    bgmPlayer.src=TITLE_BGM;
    bgmPlayer.load();
    bgmPlayer.play().catch(()=>{});
}
function playClearBGM(){
    if(bgmPlayer.src.endsWith(CLEAR_BGM)){
        return;
    }
    bgmPlayer.pause();
    bgmPlayer.src=CLEAR_BGM;
    bgmPlayer.load();
    bgmPlayer.play().catch(()=>{});
}
function playSE(src){
    if(!soundEnabled){
        return;
    }
    const se=new Audio(src);
    se.volume=0.8;
    se.play().catch(()=>{});
}

// 画像切替専用関数
function loadStageMedia(stageData){
    if(bgPict1 instanceof HTMLVideoElement){
        bgPict1.pause();
    }
    bgPict2=new Image();
    bgPict2.onload=()=>{
        pict2Ctx.clearRect( 0,0,WORLD_W,WORLD_H );
        pict2Ctx.drawImage( bgPict2,0,0,WORLD_W,WORLD_H );
    };
    bgPict2.src=stageData.pict2;
    if(typeof stageData.pict1 === "string" && /\.(mp4|webm)$/i.test(stageData.pict1)){
        bgPict1=document.createElement("video");
        bgPict1.src=stageData.pict1;
        bgPict1.loop=true;
        bgPict1.muted=true;
        bgPict1.playsInline=true;
        bgPict1.preload="auto";
        bgPict1.addEventListener(
            "canplay",
            ()=>{
                bgPict1.play().catch(()=>{});
            }
        );
    }else{
        bgPict1=new Image();
        bgPict1.src=stageData.pict1;
    }
}

//クリアしたステージ番号の把握
function registerStageClear(){
    clearedStages.add(currentStageIndex);
}

function updateBestTime(){
    const time=Math.floor(currentPlayTime);
    const best=bestTimes[currentStageIndex];
    if(
        best===undefined || time < best
    ){
        bestTimes[currentStageIndex]=time;
    }
}

function loadStage(stageData){
	zoomFixed = stageData.zoomfix===true;
    zoomIn.style.display = zoomFixed ? "none" : "";
    zoomOut.style.display = zoomFixed ? "none" : "";
	console.log("loadStage",stageData);

	playerSpeed       = stageData.playerSpeed       ?? PLAYER_SPEED;
	dashMultiplier    = stageData.dashMultiplier    ?? DASH_MULTIPLIER;
	restoreBrushSize  = stageData.restoreBrushSize  ?? RESTORE_BRUSH_SIZE;
	eventDistance     = stageData.eventDistance     ?? EVENT_DISTANCE;
	useCharacterImage = stageData.useCharacterImage ?? USE_CHARACTER_IMAGE;
	characterSize     = stageData.characterSize     ?? CHARACTER_SIZE;

	loadStageMedia(stageData);
	playStageBGM(stageData);

	stageStartTime = performance.now();
	currentPlayTime = 0;
	currentStage = stageData;

	// 主人公HP初期化
	playerMaxHp = stageData.maxhp ?? playerMaxHp ?? 10;
	playerHp = playerMaxHp;

	// ボール初期化
	balls = (stageData.balls || []).map(b => ({ ...b }));

	// パドル初期化
	paddles = (stageData.paddles || []).map(p => ({
	    side: p.side,
	    y: p.y ?? WORLD_H / 2,
	    height: p.height ?? 120,
	    speed: p.speed ?? 6,
	    width: p.width ?? PADDLE_WIDTH,
	    targetMode: p.targetMode ?? "player"
	}));

	// 長方形障害物
	oblongs = (stageData.oblongs || []).map(o=>({
	    x:o.x,
	    y:o.y,
	    width:o.width,
	    height:o.height,
	    breakable:o.breakable===true,
	    dead:false
	}));

	// プレイヤー初期位置
	player.x = currentStage.startX;
	player.y = currentStage.startY;

	playerFacing = "idle";
	walkFrame = 0;
	walkTimer = 0;

	// カメラ・グリッド
	zoom = currentStage.zoom;
	cellW = WORLD_W / currentStage.cols;
	cellH = WORLD_H / currentStage.rows;

	goalUnlocked = false;
	repairPhase = 1;
	visited.clear();

	// エンディング状態初期化
	endingActive = false;
	endingPhase = 0;
	endingPhaseStart = 0;
	gridAlpha = 0.35;
	iconAlpha = 1;
	pict2Alpha = 1;
	endingTextIndex = 0;

	message.textContent = "";

	// ゲームオーバー系完全リセット
	gameOverActive = false;
	stunUntil = 0;

	if(window._gameOverTimer){
		clearTimeout(window._gameOverTimer);
		window._gameOverTimer = null;
	}

	// イベント再構築
	buildEvents();

	// パネル初期化
	if(isPanelPhase()){
		createPanelState();
		updateFixedPanels();
		console.log("panelState", panelState);
	}

	markVisited();
}
let gameMode="stageSelect";
let pressOpened=false;

// ===== ゲームタイトル設定  =====
// ===== Game Title Settings =====
const GAME_TITLE="TimeWiper - 修復者 -";
// ===============================

const GAME_REPAIRRATE="Repair";
const GAME_JOINRATE="Joint";
// ステージグリッド数
const STAGE_SELECT_COLS=2;
const STAGE_SELECT_ROWS=2;
// ステージサムネイルのサイズとページ送り矢印も含めたY位置
const gridW=470;
const gridH=320;
const gridStartY=20;
// 画像表示枠と、読み込み想定画像サイズの絶妙な固定値
const VIEW_W=574,
      VIEW_H=384,
      WORLD_W=2000,
      WORLD_H=1338;

// ===== ゲームバランス設定 =====
//
//========================================================
//Game Balance Settings
//========================================================
// PLAYER_SPEED            : Normal movement speed
// DASH_MULTIPLIER         : Dash speed multiplier when holding B
// RESTORE_BRUSH_SIZE      : Width of the restoration brush
// EVENT_DISTANCE          : Event interaction distance
// USE_CHARACTER_IMAGE     : Enable/disable character sprite
// CHARACTER_SIZE          : Character sprite size
// CHARACTER_WIDTH_RATIO   : Character width ratio (visual only; does not affect hitbox)
// CHARACTER_HEIGHT_RATIO  : Character height ratio (visual only; does not affect hitbox)
// PLAYER_RADIUS_RATIO     : Player hitbox ratio relative to ball collisions (e.g., 0.5 = half-size collision radius)

// The character movement settings described above can be arbitrarily prioritized in the stage data JSON.
// If no settings are made, or if you return to the stage selection screen, the default values ​​will be used.
//
//CHARACTER_DARKNESS_PER_STAGE
//                         : Amount of darkening applied after each stage clear
//                           (1.0 = fully dark after one stage)
// WALK_ANIM_INTERVAL      : Walking animation frame switch interval (ms)
// PLAYER_LIGHT_RADIUS     : Radius of the light around the player
// PLAYER_LIGHT_ALPHA      : Brightness of the light around the player
//ENDING_ZOOM_TIME         : ① Time required to zoom out and show the entire image after clearing a stage
//ENDING_WAIT_1            : Interval before the next ending effect
//ENDING_GRID_TIME         : ② Time required to fade out grid lines after clearing a stage
//ENDING_WAIT_2            : Interval before the next ending effect
//ENDING_PICT2_TIME        : ③ Time required to fade out the current image after clearing a stage
//ENDING_WAIT_3            : Interval before displaying endingMessage
//ENDING_TEXT_SPEED        : endingMessage display speed (ms per character)
//========================================================
//
const PLAYER_SPEED        = 8;           // 通常の移動速度
const DASH_MULTIPLIER     = 4;           // Bダッシュの倍数
const RESTORE_BRUSH_SIZE  = 130;         // 修復筆の太さ
const EVENT_DISTANCE      = 80;          // イベント当たり判定距離
const USE_CHARACTER_IMAGE = true;        // image キャラ画像ON/OFF
const CHARACTER_SIZE      = 28;          // キャラ画像サイズ
const CHARACTER_WIDTH_RATIO  = 1.0;      // キャラ横比率（見た目のみ変更。当たり判定には影響しない）
const CHARACTER_HEIGHT_RATIO = 1.4;      // キャラ縦比率（見た目のみ変更。当たり判定には影響しない）
const PLAYER_RADIUS_RATIO = 0.8;         // ボールに対するキャラの当たり判定範囲　例）0.5：キャラの半分のサイズが当たり領域

// 上記のキャラ動作設定は以下の変数にて、ステージデータJSONで任意に優先設定可。設定がない場合＆ステージ選択画面に戻ると、上記の基本値となる。
// The character behavior settings above can be overridden per stage
// using the following variables in the stage data JSON.
// If a variable is not specified, or when returning to the Stage Select screen,
// the default values above will be restored.
let playerSpeed=PLAYER_SPEED;
let dashMultiplier=DASH_MULTIPLIER;
let restoreBrushSize=RESTORE_BRUSH_SIZE;
let eventDistance=EVENT_DISTANCE;
let useCharacterImage=USE_CHARACTER_IMAGE;
let characterSize=CHARACTER_SIZE;

const CHARACTER_DARKNESS_PER_STAGE=0.02; // ステージクリアごとの黒化量(MAX1。1なら1ステージで黒化)
const WALK_ANIM_INTERVAL  = 90;          // 歩行アニメ切替間隔(ms)
const PLAYER_LIGHT_RADIUS = 35;          // 足元ライトアップの半径

//URLセーブ用配列格納例
// c…クリアしたステージ（0がステージ1）
// b…クリアしたステージごとのベストタイム（秒数。小数点以下は元々切り捨て）
//{
//    c:[0,2,4],
//    b:{
//        0:95,
//        2:123,
//        4:87
//    }
//}
function buildSaveData(){
    return{
        c:[...clearedStages].sort((a,b)=>a-b),
        b:{...bestTimes}
    };
}
//戻り値は eyJjIjpbMCwyLDRdLCJiIjp7IjAiOjk1LCIyIjoxMjMsIjQiOjg3fX0= のようなBase64文字列になる。
function encodeSaveData(){
    return btoa( JSON.stringify( buildSaveData() ) );
}
function updateSaveURL(){
    const url = location.pathname + "?save=" + encodeURIComponent( encodeSaveData() );
    history.replaceState( null, "", url );
}
function decodeSaveData(save){
    return JSON.parse( atob(save) );
}
function loadSaveFromURL(){
    const save=new URLSearchParams(location.search).get("save");
    if(!save)return;
    //異常URLパラメータでもゲーム続行可能
    try{
        const data=decodeSaveData(save);
        clearedStages.clear();
        data.c?.forEach(i=>clearedStages.add(i));
        Object.keys(bestTimes).forEach(k=>delete bestTimes[k]);
        Object.assign(bestTimes,data.b||{});
    }catch(e){}
}

//パネルシャッフル
function createPanelState(){
    const count=currentStage.cols*currentStage.rows;
    panelState=[];
    for(let i=0;i<count;i++){
        panelState.push(i);
    }
    for(let i=count-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [panelState[i],panelState[j]]=
        [panelState[j],panelState[i]];
    }
    fixedPanels.clear();
    selectedPanel=null;
}
//正解パネル固定
function updateFixedPanels(){
    const oldFixed=new Set(fixedPanels);
    fixedPanels.clear();
    for(let i=0;i<panelState.length;i++){
        if(panelState[i]===i){
            fixedPanels.add(i);
            if(!oldFixed.has(i)){
                flashPanels.set( i, performance.now()+300 );
            }
        }
    }
    if(fixedPanels.size>oldFixed.size){
        playSE(SE_PANEL);
    }
}

// ステージカーソル移動関数
function moveStageCursor(dx,dy){
    const pageSize = STAGE_SELECT_COLS * STAGE_SELECT_ROWS;
    const maxPage = Math.max(0,Math.ceil(stages.length/pageSize)-1);
    if(dx>0 && stageCursorX===STAGE_SELECT_COLS-1){
        if(stagePage<maxPage){
            stagePage++;
            stageCursorX=0;
            clampStageCursorToExisting();
        }
        return;
    }
    if(dx<0 && stageCursorX===0){
        if(stagePage>0){
            stagePage--;
            stageCursorX=STAGE_SELECT_COLS-1;
            clampStageCursorToExisting();
        }
        return;
    }
	const oldX=stageCursorX;
	const oldY=stageCursorY;
	stageCursorX=Math.max( 0, Math.min(STAGE_SELECT_COLS-1,stageCursorX+dx)  );
	stageCursorY=Math.max( 0, Math.min(STAGE_SELECT_ROWS-1,stageCursorY+dy) );
	const pageOffset=stagePage*STAGE_SELECT_COLS*STAGE_SELECT_ROWS;
	const index=pageOffset+stageCursorY*STAGE_SELECT_COLS+stageCursorX;
	if(!stages[index]){
	    stageCursorX=oldX;
	    stageCursorY=oldY;
	}
}
function clampStageCursorToExisting(){
    const pageSize = STAGE_SELECT_COLS * STAGE_SELECT_ROWS;
    const pageOffset = stagePage * pageSize;
    let index = pageOffset + stageCursorY * STAGE_SELECT_COLS + stageCursorX;
    while(
        index >= stages.length && stageCursorX > 0
    ){
        stageCursorX--;
        index = pageOffset + stageCursorY * STAGE_SELECT_COLS + stageCursorX;
    }
}

function isStageUnlocked(stage){
    if(!stage.unlockTerm){
        return true;
    }
    const required=new Set();
    stage.unlockTerm.split(",").forEach(part=>{
        part=part.trim();
        if(part.includes("-")){
            const [start,end]=part.split("-").map(Number);
            for(let i=start;i<=end;i++){
                required.add(i);
            }
        }else{
            required.add(Number(part));
        }
    });
    for(const index of required){
        if(!clearedStages.has(index)){
            return false;
        }
    }
    return true;
}

function formatTime(seconds){
    const m=Math.floor(seconds/60);

}

function isEventVisible(e){
    if(!e.hiddenUntilRepair){
        return true;
    }
    const gx=Math.max( 0, Math.min(currentStage.cols-1,Math.floor(e.x/cellW)) );
    const gy=Math.max( 0, Math.min(currentStage.rows-1,Math.floor(e.y/cellH)) );
    return visited.has(gx+","+gy);
}

function isPanelPhase(){
    return(
        currentStage.gameType==="panel" || ( currentStage.gameType==="restoring" && repairPhase===1 )
    );
}
// 修復率（塗り絵・絵合わせ対応）
function paintRate(){
    const total=currentStage.cols*currentStage.rows;
	if(currentStage.gameType==="restoring"){
	    if(repairPhase===1){
	        return fixedPanels.size/total*100;
	    }
	    return visited.size/total*100;
	}
    if(isPanelPhase()){
        return fixedPanels.size/total*100;
    }
    return visited.size/total*100;
}

// イベント処理
function nearestEvent(){
	let best=null,d=eventDistance;
	for(const e of events){
	     if(!isEventVisible(e)) continue;
	     if(e.type==="goal" && !goalUnlocked) continue;
	     const dist=Math.hypot(player.x-e.x,player.y-e.y);
	     if(dist<d){d=dist;best=e;}
	}
	return best;
}

function selectPanel(){
    const gx=Math.max(0,Math.min(currentStage.cols-1,Math.floor(player.x/cellW)));
    const gy=Math.max(0,Math.min(currentStage.rows-1,Math.floor(player.y/cellH)));
    const panelIndex=gy*currentStage.cols+gx;
    selectPanelByIndex(panelIndex);
}

function selectPanelByIndex(panelIndex){
    if(selectedPanel===null){
        if(fixedPanels.has(panelIndex)){
            return;
        }
        selectedPanel=panelIndex;
        return;
    }
    if(selectedPanel===panelIndex){
        selectedPanel=null;
        return;
    }
    if(fixedPanels.has(panelIndex)){
        selectedPanel=null;
        return;
    }
    [panelState[selectedPanel],panelState[panelIndex]]=
    [panelState[panelIndex],panelState[selectedPanel]];
    updateFixedPanels();
    selectedPanel=null;
}

	    const rect=cv.getBoundingClientRect();
	    const mx=(e.clientX-rect.left)*(VIEW_W/rect.width);
	    const my=(e.clientY-rect.top)*(VIEW_H/rect.height);

	            playSE(SE_GO);
	            leftArrowFlashUntil=performance.now()+100;
	            stagePage--;
	            return;
	        }
	        if(mx>=VIEW_W-90 && mx<=VIEW_W-20 && stagePage<maxPage){
	            playSE(SE_GO);
	            rightArrowFlashUntil=performance.now()+100;
	            stagePage++;
	            return;
	        }
	    }
	    const startX=(VIEW_W-gridW)/2;
	    const startY=gridStartY;
	    const thumbW=gridW/STAGE_SELECT_COLS;
	    const thumbH=gridH/STAGE_SELECT_ROWS;
	    if(
	        mx>=startX && mx<startX+gridW && my>=startY && my<startY+gridH
	    ){
	        const gx=Math.floor((mx-startX)/thumbW);
	        const gy=Math.floor((my-startY)/thumbH);

	        const pageOffset=stagePage*pageSize;
	        const index=pageOffset+gy*STAGE_SELECT_COLS+gx;

	        const stageData=stages[index];
	        if( stageData && isStageUnlocked(stageData) ){
	            playSE(SE_GO);
	            currentStageIndex=index;
	            loadStage(stageData);
	            gameMode="game";
	        }
	    }
	    return;
	}
    if(gameMode!=="game") return;
    if(!isPanelPhase()) return;
    if(dialogOpen) return;

	const rect=cv.getBoundingClientRect();
	const mx=(e.clientX-rect.left)*(VIEW_W/rect.width);
	const my=(e.clientY-rect.top)*(VIEW_H/rect.height);
    const srcW=VIEW_W/zoom;
    const srcH=VIEW_H/zoom;
    let sx,sy;
    if(srcW>=WORLD_W){
        sx=-(srcW-WORLD_W)/2;
    }else{
        sx=Math.max(0,Math.min(WORLD_W-srcW,player.x-srcW/2));
    }
    if(srcH>=WORLD_H){
        sy=-(srcH-WORLD_H)/2;
    }else{
        sy=Math.max(0,Math.min(WORLD_H-srcH,player.y-srcH/2));
    }
    const worldX=sx+(mx/zoom);
    const worldY=sy+(my/zoom);
    const gx=Math.max( 0,Math.min(currentStage.cols-1,Math.floor(worldX/cellW) ) );
    const gy=Math.max( 0,Math.min(currentStage.rows-1,Math.floor(worldY/cellH) ) );
    const panelIndex=gy*currentStage.cols+gx;
    selectPanelByIndex(panelIndex);
});

function drawStageSelect(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,VIEW_W,VIEW_H);
    ctx.textAlign="center";
    ctx.fillStyle="#fff";
    ctx.font="32px sans-serif";
    // ctx.fillText( GAME_TITLE, VIEW_W/2, 40 );
    const startX=(VIEW_W-gridW)/2;
    const startY=gridStartY;
    const cellW=gridW/STAGE_SELECT_COLS;
    const cellH=gridH/STAGE_SELECT_ROWS;
    for(let y=0;y<STAGE_SELECT_ROWS;y++){
        for(let x=0;x<STAGE_SELECT_COLS;x++){
            const px=startX+x*cellW;
            const py=startY+y*cellH;
            const selected = x === stageCursorX && y === stageCursorY;
			if(selected){
			    ctx.lineWidth = 4;
			    ctx.strokeStyle = "#ff0";
			    ctx.strokeRect(px,py,cellW,cellH);
			}
			const pageOffset = stagePage * STAGE_SELECT_COLS * STAGE_SELECT_ROWS;
			const index = pageOffset + y * STAGE_SELECT_COLS + x;

			const stageData = stages[index];
			if(stageData){
			    const unlocked = isStageUnlocked(stageData);
				if(unlocked){
				    const thumbImage=
				        clearedStages.has(index)&&stageData.clearImage
				            ? stageData.clearImage
				            : stageData.image;
				    if(
				        thumbImage.complete &&
				        thumbImage.naturalWidth>0
				    ){
				        ctx.drawImage(thumbImage,px+8,py+8,cellW-16,cellH-32
				        );
				    }
				}else{
				    if(
				        lockImage.complete && lockImage.naturalWidth>0
				    ){
				        ctx.drawImage(lockImage,px+8,py+8,cellW-16,cellH-32);
				    }
				}
			    ctx.fillStyle="#fff";
			    ctx.font="16px sans-serif";
				ctx.fillText(
				    unlocked
				        ? stageData.title
				        : (stageData.unlockMsg || "LOCKED"),
				    px+cellW/2,
				    py+cellH-8
				);
				if( unlocked && clearedStages.has(index) ){
				    ctx.font="28px sans-serif";
				    ctx.fillStyle="#0f0";
				    ctx.fillText("✓",px+cellW-20,py+30);
				}
			}
        }
    }
	const pageSize=STAGE_SELECT_COLS*STAGE_SELECT_ROWS;
	const maxPage=Math.max(0,Math.ceil(stages.length/pageSize)-1);
	const now=performance.now();
	ctx.font="36px sans-serif";
	const arrowY=startY+gridH/2+12;
	if(stagePage>0){
	    ctx.font=now<leftArrowFlashUntil ? "28px sans-serif" : "36px sans-serif";
	    ctx.fillText("◀",25,arrowY);
	}
	if(stagePage<maxPage){
	    ctx.font=now<rightArrowFlashUntil ? "28px sans-serif" : "36px sans-serif";
	    ctx.fillText("▶",VIEW_W-25,arrowY);
	}
	ctx.textAlign="left";
}

function drawBackground(sx,sy,srcW,srcH){
    const source=bgPict2;
    let canDraw=false;
    if(source instanceof HTMLImageElement){
        canDraw=source.complete&&source.naturalWidth>0;
    }
    if(source instanceof HTMLVideoElement){
        canDraw=source.readyState>=2;
    }
    if(!canDraw){
        ctx.fillStyle="#567";
        ctx.fillRect(0,0,VIEW_W,VIEW_H);
        return;
    }
    const pict1MediaW=bgPict1 instanceof HTMLVideoElement ? bgPict1.videoWidth : bgPict1.width;
    const pict1MediaH=bgPict1 instanceof HTMLVideoElement ? bgPict1.videoHeight : bgPict1.height;
    ctx.drawImage(
        bgPict1,
        sx/WORLD_W*pict1MediaW,
        sy/WORLD_H*pict1MediaH,
        srcW/WORLD_W*pict1MediaW,
        srcH/WORLD_H*pict1MediaH,
        0,0,VIEW_W,VIEW_H
    );
    ctx.save();
    ctx.globalAlpha=pict2Alpha;
    if(isPanelPhase()){
        const panelCols=currentStage.cols;
        const panelRows=currentStage.rows;
        const panelWorldW=WORLD_W/panelCols;
        const panelWorldH=WORLD_H/panelRows;
        for(let gy=0;gy<panelRows;gy++){
            for(let gx=0;gx<panelCols;gx++){
                const destIndex=gy*panelCols+gx;
                const sourceIndex=panelState[destIndex];
                const srcGX=sourceIndex%panelCols;
                const srcGY=Math.floor(sourceIndex/panelCols);
                if(fixedPanels.has(destIndex)){
                    if(currentStage.gameType==="restoring"){
                        ctx.drawImage(
                            pict2Canvas,
                            srcGX*panelWorldW,srcGY*panelWorldH,
                            panelWorldW,panelWorldH,
                            (gx*panelWorldW-sx)*zoom,
                            (gy*panelWorldH-sy)*zoom,
                            panelWorldW*zoom,
                            panelWorldH*zoom
                        );
                    }else{
                        ctx.drawImage(
                            bgPict1,
                            srcGX*(pict1MediaW/panelCols),
                            srcGY*(pict1MediaH/panelRows),
                            pict1MediaW/panelCols,
                            pict1MediaH/panelRows,
                            (gx*panelWorldW-sx)*zoom,
                            (gy*panelWorldH-sy)*zoom,
                            panelWorldW*zoom,
                            panelWorldH*zoom
                        );
                    }
                }else{
                    ctx.drawImage(
                        pict2Canvas,
                        srcGX*panelWorldW,srcGY*panelWorldH,
                        panelWorldW,panelWorldH,
                        (gx*panelWorldW-sx)*zoom,
                        (gy*panelWorldH-sy)*zoom,
                        panelWorldW*zoom,
                        panelWorldH*zoom
                    );
                }
            }
        }
    }else{
        ctx.drawImage(pict2Canvas,sx,sy,srcW,srcH,0,0,VIEW_W,VIEW_H);
    }
    ctx.restore();
}

function drawGrid(sx,sy,srcW,srcH){
    if(!showGrid)return;
    ctx.strokeStyle=`rgba(255,255,255,${gridAlpha})`;
    ctx.lineWidth=1;
    const cellWorldW=cellW;
    const cellWorldH=cellH;
    const startGX=Math.floor(sx/cellWorldW);
    const endGX=Math.ceil((sx+srcW)/cellWorldW);
    for(let gx=startGX;gx<=endGX;gx++){
        const worldX=gx*cellWorldW;
        const screenX=(worldX-sx)*zoom;
        ctx.beginPath();
        ctx.moveTo(screenX,0);
        ctx.lineTo(screenX,VIEW_H);
        ctx.stroke();
    }
    const startGY=Math.floor(sy/cellWorldH);
    const endGY=Math.ceil((sy+srcH)/cellWorldH);
    for(let gy=startGY;gy<=endGY;gy++){
        const worldY=gy*cellWorldH;
        const screenY=(worldY-sy)*zoom;
        ctx.beginPath();
        ctx.moveTo(0,screenY);
        ctx.lineTo(VIEW_W,screenY);
        ctx.stroke();
    }
}

function drawEvents(sx,sy){
    ctx.save();
    ctx.globalAlpha=iconAlpha;
    for(const e of events){
        if(!isEventVisible(e))continue;
        if(e.type==="goal"&&!goalUnlocked)continue;
        const ex=(e.x-sx)*zoom;
        const ey=(e.y-sy)*zoom;
        const icon=
            e.type==="goal"
                ? "★"
                : (e.read?"✓":"▼");
        if(e.type==="goal"){
            const scale=1+Math.sin(performance.now()/250)*0.15;
            ctx.save();
            ctx.fillStyle="#ff0";
            ctx.font="24px sans-serif";
            ctx.translate(ex,ey);
            ctx.scale(scale,scale);
            ctx.fillText(icon,0,0);
            ctx.restore();
        }else{
            ctx.fillStyle="#fff";
            ctx.font="20px sans-serif";
            ctx.fillText(icon,ex,ey);
        }
    }
    ctx.restore();
}

    ctx.strokeStyle="#ff0";
    ctx.lineWidth=3;
    ctx.strokeRect((gx*cellW-sx)*zoom,(gy*cellH-sy)*zoom,cellW*zoom,cellH*zoom);
    ctx.restore();
    ctx.save();
    ctx.globalAlpha=iconAlpha;
    for(const fixedIndex of fixedPanels){
        const fx=fixedIndex%currentStage.cols;
        const fy=Math.floor(fixedIndex/currentStage.cols);
        ctx.strokeStyle="#0f0";
        ctx.lineWidth=3;
        const inset=ctx.lineWidth/2;
        ctx.strokeRect(
            (fx*cellW-sx)*zoom+inset,
            (fy*cellH-sy)*zoom+inset,
            cellW*zoom-inset*2,
            cellH*zoom-inset*2
        );
    }
    ctx.restore();
    ctx.save();
    for(const [panelIndex,endTime] of flashPanels){
        const remain=endTime-performance.now();
        if(remain<=0){
            flashPanels.delete(panelIndex);
            continue;
        }
        const fx=panelIndex%currentStage.cols;
        const fy=Math.floor(panelIndex/currentStage.cols);
        ctx.fillStyle=`rgba(255,255,255,${remain/300})`;
        ctx.fillRect(
            (fx*cellW-sx)*zoom,
            (fy*cellH-sy)*zoom,
            cellW*zoom,
            cellH*zoom
        );
    }
    ctx.restore();
    ctx.save();
    ctx.globalAlpha=iconAlpha;
    if(selectedPanel!==null){
        const sxPanel=selectedPanel%currentStage.cols;
        const syPanel=Math.floor(selectedPanel/currentStage.cols);
        ctx.strokeStyle="#f00";
        ctx.lineWidth=4;
        ctx.strokeRect(
            (sxPanel*cellW-sx)*zoom,
            (syPanel*cellH-sy)*zoom,
            cellW*zoom,
            cellH*zoom
        );
    }
    ctx.restore();
}

// 主人公キャラ描画
function drawPlayer(sx,sy){
    const px=Math.max(8,Math.min(VIEW_W-8,(player.x-sx)*zoom));
    const py=Math.max(8,Math.min(VIEW_H-8,(player.y-sy)*zoom));
    ctx.save();
    ctx.globalAlpha=iconAlpha;
    if(
        performance.now()<stunUntil &&
        Math.floor(performance.now()/100)%2===0
    ){
        ctx.globalAlpha=0;
    }
    // 足元ライト
    const light=ctx.createRadialGradient(px,py,0,px,py,PLAYER_LIGHT_RADIUS);
    light.addColorStop(0,`rgba(255,255,255,${PLAYER_LIGHT_ALPHA})`);
    light.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=light;
    ctx.beginPath();
    ctx.arc(px,py,PLAYER_LIGHT_RADIUS,0,Math.PI*2);
    ctx.fill();
    // キャラ画像が存在しなくても動作する
    let currentSprite=playerImages.idle;
    if(playerFacing==="left"){
        currentSprite=playerImages.left;
    }else if(playerFacing==="right"){
        currentSprite=playerImages.right;
    }else if(playerFacing==="updown"){
	    if(lastMoveY<0){
	        currentSprite=
	            walkFrame===0 ? playerImages.up1 : playerImages.up2;
	    }else if(lastMoveY>0){
	        currentSprite=
	            walkFrame===0 ? playerImages.down1 : playerImages.down2;
	    }else{
	        // ★修正：完全停止時の idle は向きで決める
	        currentSprite =
	            playerImages.down_idle; // ←または up_idle（好みでOK）
	    }
	}else{
	    currentSprite =
	        lastMoveY < 0
	            ? playerImages.up_idle
	            : playerImages.down_idle;
	}
    if(
        useCharacterImage &&
        currentSprite.complete &&
        currentSprite.naturalWidth>0
    ){
        const darkness=Math.min(
            1,
            clearedStages.size*CHARACTER_DARKNESS_PER_STAGE
        );
        ctx.filter=`brightness(${1-darkness})`;
		ctx.drawImage(
		    currentSprite,
		    px-(characterSize*CHARACTER_WIDTH_RATIO)/2,
		    py-(characterSize*CHARACTER_HEIGHT_RATIO)/2,
		    characterSize*CHARACTER_WIDTH_RATIO,
		    characterSize*CHARACTER_HEIGHT_RATIO
		);
        ctx.filter="none";
    }else{
    	// キャラ画像が存在しない場合は白い●記号をキャラの代わりとする
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(px,py,characterSize/3,0,Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

// ボール更新関数。パドルと主人公の当たり判定も兼ねる
function updateBalls(){
	if(gameMode!=="game") return;
    for(const ball of balls){
        ball.x+=ball.vx;
        ball.y+=ball.vy;
        // ボール壁反射処理。反射に角度ノイズ追加
		if(ball.x < ball.radius){
		    ball.x = ball.radius;
		    ball.vx *= -1;
		    ball.vy += (Math.random() - 0.5) * 0.6;
		}
		if(ball.x > WORLD_W - ball.radius){
		    ball.x = WORLD_W - ball.radius;
		    ball.vx *= -1;
		    ball.vy += (Math.random() - 0.5) * 0.6;
		}
		if(ball.y < ball.radius){
		    ball.y = ball.radius;
		    ball.vy *= -1;
		    ball.vx += (Math.random() - 0.5) * 0.6;
		}
		if(ball.y > WORLD_H - ball.radius){
		    ball.y = WORLD_H - ball.radius;
		    ball.vy *= -1;
		    ball.vx += (Math.random() - 0.5) * 0.6;
		}
		// パドル衝突
		for(const p of paddles){
		  const w = p.width;
		  const h = p.height;
		  const px = (p.side === "left") ? 0 : WORLD_W;
		  const dx = Math.abs(ball.x - px);
		  const dy = Math.abs(ball.y - p.y);
		  if(dx < ball.radius + w && dy < h/2){
		    ball.vx *= -1;
		    // ちょい角度変化（単調防止）
		    ball.vy += (Math.random() - 0.5) * 1.2;
		  }
		}

		// oblong衝突
		for(const o of oblongs){
		    if(o.dead) continue;
			const left=o.x;
			const top=o.y;
			const right=o.x+o.width;
			const bottom=o.y+o.height;

			if(
			    ball.x+ball.radius>left &&
			    ball.x-ball.radius<right &&
			    ball.y+ball.radius>top &&
			    ball.y-ball.radius<bottom
			){
			    const nearestX=Math.max(left,Math.min(ball.x,right));
			    const nearestY=Math.max(top,Math.min(ball.y,bottom));

			    const dx=ball.x-nearestX;
			    const dy=ball.y-nearestY;

			    if(Math.abs(dx)>Math.abs(dy)){
			        ball.vx*=-1;
			    }else{
			        ball.vy*=-1;
			    }

			    if(o.breakable){
			        o.dead=true;
			    }
			    break;
			}
		}

        // ボールと主人公の当たり判定
		const hitDist = ball.radius + characterSize * PLAYER_RADIUS_RATIO;
		if(
		    !gameOverActive &&
		    Math.hypot(ball.x-player.x,ball.y-player.y)<hitDist
		){
		    if(performance.now() > stunUntil){
		        stunUntil = performance.now() + 1000;

		        // ダメージ処理（現状維持）
		        playerHp = Math.max(0, playerHp - 1);
		        playSE(SE_DAMAGE);

		        // ★追加：ボール反射処理（主人公→ボール方向で反射）
		        const nx = ball.x - player.x;
		        const ny = ball.y - player.y;
		        const len = Math.hypot(nx, ny) || 1;
		        const ux = nx / len;
		        const uy = ny / len;

		        const dot = ball.vx * ux + ball.vy * uy;

		        ball.vx = ball.vx - 2 * dot * ux;
		        ball.vy = ball.vy - 2 * dot * uy;

		        // 少しだけ押し出してめり込み防止
		        ball.x = player.x + ux * hitDist;
		        ball.y = player.y + uy * hitDist;

		        if(playerHp <= 0 && !gameOverActive){
		            gameOverActive = true;
		            message.textContent = "GAME OVER...";

		            if(window._gameOverTimer){
		                clearTimeout(window._gameOverTimer);
		            }

		            window._gameOverTimer = setTimeout(()=>{
		                gameMode = "stageSelect";
		                gameOverActive = false;
		                window._gameOverTimer = null;
		            },1500);
		        }
		    }
		}

		// パドルと主人公の当たり判定
        for(const p of paddles){

            const paddleWidth = p.width ?? 20;
            const paddleHeight = p.height ?? 120;

            const paddleX = (p.side === "left") ? 0 : WORLD_W;
            const paddleY = p.y;

            const dx = player.x - paddleX;
            const dy = player.y - paddleY;

            const hitW = paddleWidth / 2;
            const hitH = paddleHeight / 2;

            if(
			    !gameOverActive &&
			    Math.abs(dx)<hitW &&
			    Math.abs(dy)<hitH
			){
                if(performance.now() > stunUntil){
                    stunUntil = performance.now() + 800;
                    playerHp = Math.max(0, playerHp - 1);
                    playSE(SE_DAMAGE);

                    if(playerHp <= 0 && !gameOverActive){
                        gameOverActive = true;
                        stunUntil = Infinity;
                        message.textContent = "GAME OVER...";

                        if(window._gameOverTimer){
                            clearTimeout(window._gameOverTimer);
                        }

                        window._gameOverTimer = setTimeout(()=>{
                            gameMode = "stageSelect";
                            gameOverActive = false;
                            window._gameOverTimer = null;
                        },1500);
                    }
                }
            }
        }
    }
}

// 赤いボール描画関数
function drawBalls(sx,sy){
  if(endingActive || balls.length === 0) return;

  for(const b of balls){
    const bx=(b.x-sx)*zoom,by=(b.y-sy)*zoom,r=b.radius*zoom;

    ctx.save();
    //ネオン感
	ctx.shadowBlur=35*zoom;
	ctx.shadowColor="rgba(255,120,120,1)";

    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(bx+r*0.25,by+r*0.35,r*0.9,r*0.55,0,0,Math.PI*2);
    ctx.fill();

    const g=ctx.createRadialGradient(bx-r*0.3,by-r*0.3,r*0.1,bx,by,r);
    g.addColorStop(0,"rgba(255,255,255,0.9)");
    g.addColorStop(0.25,"rgba(255,80,80,1)");
    g.addColorStop(1,"rgba(120,0,0,1)");
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="rgba(255,255,255,0.25)";
    ctx.lineWidth=r*0.15;
    ctx.beginPath();
    ctx.arc(bx-r*0.2,by-r*0.2,r*0.6,Math.PI*1.1,Math.PI*1.7);
    ctx.stroke();
    ctx.restore();
  }
}

//パドル描画
function drawPaddles(sx,sy){
  if(endingActive || paddles.length === 0) return;

  for(const p of paddles){
    ctx.save();
    //ネオン感
	ctx.shadowBlur=35*zoom;
	ctx.shadowColor="rgba(255,120,120,1)";

    const baseX = (p.side==="left") ? 0 : WORLD_W;
    const px = (baseX - sx) * zoom;
    const py = (p.y - sy) * zoom;
    const w = (p.width ?? 20) * zoom;
    const h = (p.height ?? 120) * zoom;
    // 影
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(px - w/2 + 4*zoom, py - h/2 + 6*zoom, w, h);
    // 本体（赤グラデ）
    const isLeft = p.side === "left";
	const g = ctx.createLinearGradient(
	  isLeft ? px - w/2 : px + w/2,
	  py,
	  isLeft ? px + w/2 : px - w/2,
	  py
	);
    g.addColorStop(0,"rgba(255,255,255,0.9)");
    g.addColorStop(0.3,"rgba(255,80,80,1)");
    g.addColorStop(1,"rgba(120,0,0,1)");
    ctx.fillStyle = g;
    ctx.fillRect(px - w/2, py - h/2, w, h);
    // ハイライト枠
    ctx.strokeStyle="rgba(255,255,255,0.3)";
    ctx.lineWidth=2*zoom;
    ctx.strokeRect(px - w/2, py - h/2, w, h);
    ctx.restore();
  }
}

//oblong（長方形障害物）描画
function drawOblongs(sx,sy){
    if(endingActive || oblongs.length === 0) return;

    for(const o of oblongs){
        if(o.dead) continue;
        const x=(o.x-sx)*zoom;
        const y=(o.y-sy)*zoom;
        const w=o.width*zoom;
        const h=o.height*zoom;
        ctx.save();
        ctx.shadowBlur=35*zoom;
        ctx.shadowColor="rgba(100,180,255,1)";
        const indestructible = o.breakable===false;
        const g=ctx.createLinearGradient(
            x-w/2,
            y-h/2,
            x+w/2,
            y+h/2
        );

		    g.addColorStop(0,"rgba(255,255,255,0.9)");

		    g.addColorStop(0,"rgba(255,255,255,0.9)");
		    g.addColorStop(0.3,"rgba(80,180,255,1)");
		    g.addColorStop(1,"rgba(0,40,120,1)");
		    ctx.shadowColor="rgba(80,180,255,1)";
		}
        ctx.fillStyle=g;
		ctx.fillRect(
		    x,
		    y,
		    w,
		    h
		);

		    x,
		    y,
		    w,
		    h
		);

//パドル更新処理
function updatePaddles(){
  if(gameMode!=="game") return;
  for(const p of paddles){
    // デフォルトはプレイヤー追尾
    let targetY = player.y;
    // パドルに近いボール追尾モード
    if(p.targetMode === "ball" && balls.length){
      let best = null;
      let bestD = Infinity;
      for(const b of balls){
        const d = Math.abs(b.x - (p.side==="left"?0:WORLD_W));
        if(d < bestD){
          bestD = d;
          best = b;
        }
      }
      if(best){
      	//ボールの予測追尾
        const predictFrames = 10;
        targetY = best.y + best.vy * predictFrames;
      }
    }
    const dir = targetY - p.y;
    if(Math.abs(dir) > 2){
      p.y += Math.sign(dir) * p.speed;
    }
    // 画面外防止
    p.y = Math.max(0, Math.min(WORLD_H, p.y));
  }
}

function updateHUD(rate){
    // ゴール判定
    const rateLabel=
        isPanelPhase()
            ? GAME_JOINRATE
            : GAME_REPAIRRATE;
    // 修復率達成でゴール解放
    if(
        (
            currentStage.gameType==="paint"
            ||
            (
                currentStage.gameType==="restoring"
                &&
                repairPhase===2
            )
        )
        &&
        rate>=currentStage.clearRate
    ){
        goalUnlocked=true;
    }
    loadButtons.style.visibility="visible";
    miniMap.style.visibility="visible";
    gridPos.style.visibility="visible";
    gridControls.style.visibility="visible";
    timeText.style.display="block";
    drawMiniMap();
    const gx=Math.max(0,Math.min(currentStage.cols-1,Math.floor(player.x/cellW)));
    const gy=Math.max(0,Math.min(currentStage.rows-1,Math.floor(player.y/cellH)));
    statusText.innerHTML=
        `<span class="stageTitle">${currentStage.title}</span>　Mission：${currentStage.goalCondition}　${rateLabel}：${rate.toFixed(1)}%`;
    backBtn.style.display="inline-block";
    gridPos.innerHTML=
        `x${gx},y${gy}  Zoom:${zoom.toFixed(1)}${zoomFixed?"FIX":""}<br>X:${Math.floor(player.x)} Y:${Math.floor(player.y)}`;
    timeText.textContent=
        "TIME "+formatTime(currentPlayTime);
    hpText.textContent = `HP ${playerHp} / ${playerMaxHp}`;
    const bestTime=bestTimes[currentStageIndex];
    bestText.textContent=
        bestTime===undefined
            ? "BEST --:--"
            : "BEST "+formatTime(bestTime);
    if(!endingActive){
        if(isPanelPhase()){
            message.textContent="Swap panels to fix the picture.";
        }else{
            message.textContent=
                goalUnlocked
                    ? "★ Goal Unlocked!"
                    : "Walk around and fix the world.";
        }
    }
}

function getCamera(){
    // カメラ計算
    const srcW=VIEW_W/zoom;
    const srcH=VIEW_H/zoom;
    let sx,sy;
    if(srcW>=WORLD_W){
        sx=-(srcW-WORLD_W)/2;
    }else{
        sx=Math.max(0,Math.min(WORLD_W-srcW,player.x-srcW/2));
    }
    if(srcH>=WORLD_H){
        sy=-(srcH-WORLD_H)/2;
    }else{
        sy=Math.max(0,Math.min(WORLD_H-srcH,player.y-srcH/2));
    }
    return{
        sx,
        sy,
        srcW,
        srcH
    };
}

function drawMiniMap(){
	 miniCtx.fillStyle="#000";
	 miniCtx.fillRect(0,0,miniCtx.canvas.width,miniCtx.canvas.height);
	 const cellW=
	   miniCtx.canvas.width/currentStage.cols
	 const cellH=
	   miniCtx.canvas.height/currentStage.rows;
	 visited.forEach(key=>{
	   const [cx,cy]=
	     key.split(",").map(Number);
	   miniCtx.fillStyle="#0f0";
	   miniCtx.fillRect(cx*cellW,cy*cellH,cellW,cellH);
	 });

	// イベント描画
	for(const e of events){
	    if(!isEventVisible(e)) continue;
	    if(e.type==="goal" && !goalUnlocked) continue;
	    const ex=Math.floor(
	      e.x/(WORLD_W/currentStage.cols)
	    );
	    const ey=Math.floor(
	      e.y/(WORLD_H/currentStage.rows)
	    );
	    miniCtx.fillStyle =
	        e.type==="goal"
	          ? "#0ff"
	          : (e.read ? "#666" : "#ff0");
	    miniCtx.fillRect(ex*cellW,ey*cellH,cellW,cellH);
	}

	// プレイヤー描画（最後）
	const px=Math.max(
	  0,
	  Math.min(
	    currentStage.cols-1,
	    Math.floor(player.x/(WORLD_W/currentStage.cols))
	  )
	);

	const py=Math.max(
	  0,
	  Math.min(
	    currentStage.rows-1,
	    Math.floor(player.y/(WORLD_H/currentStage.rows))
	  )
	);
	miniCtx.fillStyle="#f00";
	miniCtx.fillRect(px*cellW,py*cellH,cellW,cellH);

	// 現在の視界枠
	const srcW = VIEW_W / zoom;
	const srcH = VIEW_H / zoom;
	let sx = Math.max( 0, Math.min( WORLD_W - srcW, player.x - srcW/2 ) );
	let sy = Math.max( 0, Math.min( WORLD_H - srcH, player.y - srcH/2 ) );
	miniCtx.strokeStyle="#fff";
	miniCtx.lineWidth=1;
	miniCtx.strokeRect(
	  sx/WORLD_W * miniCtx.canvas.width,
	  sy/WORLD_H * miniCtx.canvas.height,
	  srcW/WORLD_W * miniCtx.canvas.width,
	  srcH/WORLD_H * miniCtx.canvas.height
	);
}

function updateEnding(){
    if(!endingActive)return;
    const now=performance.now();
    const elapsed=now-endingPhaseStart;
    if(endingPhase===1){
        const t=Math.min(1,elapsed/ENDING_ZOOM_TIME);
        zoom = zoom + (MIN_ZOOM-zoom) * 0.05;
        if(t>=1){
            zoom=MIN_ZOOM;
            endingPhase=2;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===2){
        if(elapsed>=ENDING_WAIT_1){
            endingPhase=3;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===3){
        const t=Math.min(1,elapsed/ENDING_GRID_TIME);
        gridAlpha=0.35*(1-t);
        iconAlpha=1-t;
        if(t>=1){
            gridAlpha=0;
            iconAlpha=0;
            endingPhase=4;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===4){
        if(elapsed>=ENDING_WAIT_2){
        	playClearBGM();
            endingPhase=5;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===5){
        const t=Math.min(1,elapsed/ENDING_PICT2_TIME);
        pict2Alpha=1-t;
        if(t>=1){
            pict2Alpha=0;
            endingPhase=6;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===6){
	    if(elapsed>=ENDING_WAIT_3){
	        endingTextIndex=0;
	        message.textContent="";
	        endingPhase=7;
	        endingPhaseStart=now;
	    }
	}
	else if(endingPhase===7){
	    const text = currentStage.endingMessage || "世界は、本来の姿を取り戻した。";
	    const count= 1 + Math.floor( elapsed / ENDING_TEXT_SPEED );
	    endingTextIndex=Math.min( text.length, count );
	    message.textContent=
	        text.slice(0,endingTextIndex);
	    if(endingTextIndex>=text.length){
	        endingPhase=8;
	    }
	}
}

		gridPos.style.visibility="hidden";
		gridControls.style.visibility="hidden";

		const pageOffset=stagePage*STAGE_SELECT_COLS*STAGE_SELECT_ROWS;
		const index=pageOffset+stageCursorY*STAGE_SELECT_COLS+stageCursorX;
		const bestTime=bestTimes[index];

		bestText.textContent=
		    bestTime===undefined
		        ? "BEST --:--"
		        : "BEST "+formatTime(bestTime);

		timeText.style.display="none";

	    return;
	}

	// カメラ計算
	const {sx,sy,srcW,srcH}=getCamera();

	ctx.clearRect(0,0,VIEW_W,VIEW_H);

	//現在画像
	drawBackground(sx,sy,srcW,srcH);
	// グリッド罫線表示
	drawGrid(sx,sy,srcW,srcH);
	//イベントアイコン表示
	drawEvents(sx,sy);
	//ボール表示
	drawBalls(sx,sy);
	//バドル描画
	drawPaddles(sx,sy);
	//oblong（長方形障害物）描画
	drawOblongs(sx,sy);
	// パネルUI描画
	drawPanelUI(sx,sy);
	// 主人公キャラ描画
	drawPlayer(sx,sy);
	const rate=paintRate();
	updateHUD(rate);
}

function loop(){
    if(gameOverActive) {
        draw();
        requestAnimationFrame(loop);
        return;
    }
    if(
        gameMode==="game" && !endingActive
    ){
	    currentPlayTime = (performance.now()-stageStartTime)/1000;
	}
	if(
	    !dialogOpen &&
	    performance.now()>=stunUntil
	){
		  let dx=padDX,dy=padDY;
		  if(keys.arrowup)dy--;
		  if(keys.arrowdown)dy++;
		  if(keys.arrowleft)dx--;
		  if(keys.arrowright)dx++;
		if(dx||dy){
		    const len=Math.hypot(dx,dy);
		    dx/=len;
		    dy/=len;
		    // ★追加：最後の移動方向を保存
		    lastMoveY = dy;

		    if(dy!==0){
		        lastMoveY=dy;
		    }
		    if(Math.abs(dx)>Math.abs(dy)){
		        playerFacing=dx<0?"left":"right";
		    }else if(dy!==0){
		        playerFacing="updown";
		    }
		    walkTimer+=16;
		    if(walkTimer>=WALK_ANIM_INTERVAL){
		        walkTimer=0;
		        walkFrame=1-walkFrame;
		    }
		    const ox=player.x;
		    const oy=player.y;
		    const currentSpeed=
		      playerSpeed*
		      (dashActive?dashMultiplier:1);
		    player.x=Math.max(
		      0,
		      Math.min(
		        WORLD_W,
		        player.x+dx*currentSpeed
		      )
		    );
		    player.y=Math.max(
		      0,
		      Math.min(
		        WORLD_H,
		        player.y+dy*currentSpeed
		      )
		    );
		    if(!isPanelPhase()){
		        pict2Ctx.save();
		        pict2Ctx.globalCompositeOperation="destination-out";
		        pict2Ctx.strokeStyle="#000";
		        pict2Ctx.lineWidth=restoreBrushSize;
		        pict2Ctx.lineCap="round";
		        pict2Ctx.beginPath();
		        pict2Ctx.moveTo(ox,oy);
		        pict2Ctx.lineTo(player.x,player.y);
		        pict2Ctx.stroke();
		        pict2Ctx.restore();
		    }
		    markVisited();
		}else{
		    walkFrame=0;
		    walkTimer=0;
		}
	}
	if(
	    currentStage.gameType==="restoring" && repairPhase===1 && fixedPanels.size===panelState.length
	){
	    repairPhase=2;
	    visited.clear();
	    markVisited();
	    buildEvents();
	    playStageBGM(currentStage);
	}
	else if(
	    isPanelPhase() && !endingActive && paintRate()>=100
	){
	    registerStageClear();
	    updateBestTime();
	    updateSaveURL();

	    // ★追加：レイヤー1（背景）だけ見せるためゲーム要素削除
	    balls.length = 0;
	    paddles.length = 0;
	    oblongs.length = 0;

	    goalUnlocked = false;

	    endingActive = true;
	    endingPhase = 1;
	    endingPhaseStart = performance.now();
	}
	if(gameMode==="game"){
	    updateBalls();
	    updatePaddles();
	    updateOblongs();
	}
	updateEnding();
	draw();
	requestAnimationFrame(loop);
}
//↑↓←→  移動
//A       調べる
//B       ダッシュ
//Space   調べる
//J       調べる（互換）
addEventListener("keydown",e=>{
    if(!pressOpened){
        showTitlePanel();
        return;
    }
    if(isTitlePanelOpen()){
        return;
    }
	const key=e.key.toLowerCase();
	keys[key]=true;
	if(gameMode==="stageSelect"){
	    if(bgmPlayer.paused){
	        playTitleBGM();
	    }	
	    if(key==="arrowleft"){
	        moveStageCursor(-1,0);
	    }
	    if(key==="arrowright"){
	        moveStageCursor(1,0);
	    }
	    if(key==="arrowup"){
	        moveStageCursor(0,-1);
	    }
	    if(key==="arrowdown"){
	        moveStageCursor(0,1);
	    }
	}
	if(
	    e.key===" " || key==="j" || key==="a"
	){
		if(gameMode==="stageSelect"){
			const pageOffset = stagePage * STAGE_SELECT_COLS * STAGE_SELECT_ROWS;
			const index = pageOffset + stageCursorY * STAGE_SELECT_COLS + stageCursorX;
    
			const stageData=stages[index];
				if( stageData && isStageUnlocked(stageData) ){
				    currentStageIndex=index;
				    loadStage(stageData);
				    gameMode="game";
				}
		    return;
		}
	    if(isPanelPhase()){
	        selectPanel();
	        return;
	    }
	    if(dialogOpen){
	        closeEvent();
	    }else{
	        openEvent();
	    }
	}
	if(key==="b"){
	     if(dialogOpen){
	          closeEvent();
	     }else{
	          dashActive=true;
	     }
	}
	if(
	    dialogOpen && e.key==="Enter"
	){
	    closeEvent();
	}
});
addEventListener("keyup",e=>{
	 const key=e.key.toLowerCase();
	 delete keys[key];
	 if(key==="b"){
		  dashActive=false;
	 }
});

document.querySelectorAll("[data-dx]").forEach(b=>{
     const on=()=>{
        if(isTitlePanelOpen()){
            return;
        }
	    if(gameMode==="stageSelect" && bgmPlayer.paused){
	        playTitleBGM();
	    }
        const dx=+b.dataset.dx;
        const dy=+b.dataset.dy;
        if(gameMode==="stageSelect"){
            moveStageCursor(dx,dy);
            return;
        }
        padDX=dx;
        padDY=dy;
     };
     const off=()=>{
        padDX=0;
        padDY=0;
     };
     b.addEventListener("pointerdown",on);
     b.addEventListener("pointerup",off);
     b.addEventListener("pointerleave",off);
});

// 画像ファイル指定
loadPict1Btn.onclick=()=>{
    loadTarget="pict1";
    filePicker.click();
};

loadPict2Btn.onclick=()=>{
    loadTarget="pict2";
    filePicker.click();
};
filePicker.onchange=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const url=URL.createObjectURL(f);
    // メモリ解放
    if(loadTarget==="pict1"){
	    if(currentPict1ObjectURL){
	        URL.revokeObjectURL(currentPict1ObjectURL);
	    }
	    currentPict1ObjectURL=url;
	}else{
	    if(currentPict2ObjectURL){
	        URL.revokeObjectURL(currentPict2ObjectURL);
	    }
	    currentPict2ObjectURL=url;
	}
    
    // Pict1 LOAD
	if(loadTarget==="pict1"){
	    if(bgPict1 instanceof HTMLVideoElement){
	        bgPict1.pause();
	        bgPict1.src="";
	        bgPict1.load();
	    }
	    if(/\.(mp4|webm)$/i.test(f.name)){
	        const video=document.createElement("video");
	        video.src=url;
	        video.loop=true;
	        video.muted=true;
	        video.playsInline=true;
	        video.addEventListener("loadeddata",()=>{
	            video.play().catch(()=>{});
	            bgPict1=video;
	        });
        }else{
            const img=new Image();
            img.onload=()=>{
                bgPict1=img;
            };
            img.src=url;
        }
        return;
    }
    // Pict2 LOAD
    const img=new Image();
	img.onload=()=>{
	    bgPict2=img;
		pict2Ctx.clearRect(0,0,WORLD_W,WORLD_H);
		pict2Ctx.drawImage(bgPict2,0,0,WORLD_W,WORLD_H);
	};
    img.src=url;
};

// 画面サイズに合わせてゲーム全体を縮小
function fitGameToScreen(){
    const game=document.getElementById("game");
    const scale=Math.min(
        window.innerWidth / 854,
        window.innerHeight / 480
    ) * 0.95;
    game.style.transform = `scale(${scale})`;
    game.style.transformOrigin = "center center";
}
fitGameToScreen();
window.addEventListener(
    "resize",
    fitGameToScreen
);
