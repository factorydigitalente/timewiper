<script>
const stages=JSON.parse(document.getElementById("stageData").textContent);
let currentStage=null;
let currentStageIndex=0;

//BGM切替関数
function playStageBGM(stageData){
    const bgmPath=stageData.bgm || DEFAULT_BGM;
    if(bgmPlayer.src.endsWith(bgmPath)){
        return;
    }
    bgmPlayer.pause();
    bgmPlayer.src=bgmPath;
    bgmPlayer.load();
    bgmPlayer.play().catch(()=>{});
}
function isTitlePanelOpen(){
    return document.getElementById("title-panel").style.display==="flex";
}
function showTitlePanel(){
    if(pressOpened){
        return;
    }
    pressOpened=true;
    document.getElementById("press-panel").style.display="none";
    document.getElementById("title-panel").style.display="flex";
    playTitleBGM();
}
function playTitleBGM(){
    if(bgmPlayer.src.endsWith(TITLE_BGM)){
        return;
    }
    bgmPlayer.pause();
    bgmPlayer.src=TITLE_BGM;
    bgmPlayer.load();
    bgmPlayer.play().catch(()=>{});
}
function playClearBGM(){
    if(bgmPlayer.src.endsWith(CLEAR_BGM)){
        return;
    }
    bgmPlayer.pause();
    bgmPlayer.src=CLEAR_BGM;
    bgmPlayer.load();
    bgmPlayer.play().catch(()=>{});
}
function playSE(src){
    const se=new Audio(src);
    se.volume=0.8;
    se.play().catch(()=>{});
}

// 画像切替専用関数
function loadStageMedia(stageData){
    if(bgPast instanceof HTMLVideoElement){
        bgPast.pause();
    }
    bgPresent=new Image();
    bgPresent.onload=()=>{
        presentCtx.clearRect( 0,0,WORLD_W,WORLD_H );
        presentCtx.drawImage( bgPresent,0,0,WORLD_W,WORLD_H );
    };
    bgPresent.src=stageData.present;
    if(/\.(mp4|webm)$/i.test(stageData.past)){
        bgPast=document.createElement("video");
        bgPast.src=stageData.past;
        bgPast.loop=true;
        bgPast.muted=true;
        bgPast.playsInline=true;
        bgPast.preload="auto";
        bgPast.addEventListener(
            "canplay",
            ()=>{
                bgPast.play().catch(()=>{});
            }
        );
    }else{
        bgPast=new Image();
        bgPast.src=stageData.past;
    }
}

//クリアしたステージ番号の把握
function registerStageClear(){
    clearedStages.add(currentStageIndex);
}

function loadStage(stageData){
	console.log("loadStage",stageData);
	loadStageMedia(stageData);
	playStageBGM(stageData);
    currentStage=stageData;
    player.x=currentStage.startX;
    player.y=currentStage.startY;
    zoom=currentStage.zoom;
    cellW=WORLD_W/currentStage.cols;
    cellH=WORLD_H/currentStage.rows;
	goalUnlocked=false;
	repairPhase=1;
	visited.clear();
	
	// エンディング状態を初期化
	endingActive=false;
	endingPhase=0;
	endingPhaseStart=0;

	gridAlpha=0.35;
	iconAlpha=1;
	presentAlpha=1;
	endingTextIndex=0;

	message.textContent="";

	buildEvents();
	//ステージ開始時に正解パネルを検出
	if(isPanelPhase()){
	    createPanelState();
	    updateFixedPanels();
	    console.log("panelState",panelState);
	}
	markVisited();
}
let gameMode="stageSelect";
let pressOpened=false;
// ゲーム基本情報
const GAME_TITLE="TimeWiper - 修復者 -";
const GAME_REPAIRRATE="修復率";
const GAME_JOINRATE="接合率";
// 画像表示枠と、読み込み想定画像サイズの絶妙な固定値
const VIEW_W=574,
      VIEW_H=384,
      WORLD_W=2000,
      WORLD_H=1338;
// ===== ゲームバランス設定 =====
const PLAYER_SPEED = 8; //通常の移動速度
const DASH_MULTIPLIER = 4; //Bダッシュの倍数
const RESTORE_BRUSH_SIZE = 130; //修復筆の太さ
const EVENT_DISTANCE = 80; //イベント当たり判定距離
const USE_CHARACTER_IMAGE=true; //キャラ画像ON/OFF
const CHARACTER_SIZE=28; //キャラ画像サイズ
const ENDING_ZOOM_TIME    = 1000; //①ステージクリア時にズームして全体を見せるまでの秒数
const ENDING_WAIT_1       = 1000; //次の演出までのインターバル
const ENDING_GRID_TIME    = 1000; //②ステージクリア時にグリッド線を消すまでの秒数
const ENDING_WAIT_2       = 1000; //次の演出までのインターバル
const ENDING_PRESENT_TIME = 3000; //③ステージクリア時に現在画像をフェードアウトする秒数
const ENDING_WAIT_3       = 1000; //次の演出までのインターバル（メッセージ欄にendingMessage表示）
const ENDING_TEXT_SPEED   = 70;   //endingMessageの表示速度(ms/文字)
// ============================

const clearedStages=new Set(); //ステージクリアセット

const player={
    x:0,
    y:0
};
const visited=new Set();
let events=[];
let selectedPanel=null;
let panelState=[];
let fixedPanels=new Set();

function buildEvents(){
    if(isPanelPhase()){
        events=[]; //panelモードのeventsを無効化
        return;
    }
    events=currentStage.events.map(
        e=>({...e,read:false})
    );
}

//パネルシャッフル
function createPanelState(){
    const count=currentStage.cols*currentStage.rows;
    panelState=[];
    for(let i=0;i<count;i++){
        panelState.push(i);
    }
    for(let i=count-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [panelState[i],panelState[j]]=
        [panelState[j],panelState[i]];
    }
    fixedPanels.clear();
    selectedPanel=null;
}
//正解パネル固定
function updateFixedPanels(){
    fixedPanels.clear();

    for(let i=0;i<panelState.length;i++){
        if(panelState[i]===i){
            fixedPanels.add(i);
        }
    }
}

const presentCanvas=document.createElement("canvas");
presentCanvas.width=WORLD_W;
presentCanvas.height=WORLD_H;
const presentCtx=presentCanvas.getContext("2d");

const ctx=cv.getContext("2d");
const miniCtx=
 document.getElementById("miniMap")
 .getContext("2d");

let loadTarget = "present";

let bgPresent;
let bgPast;

//BGM管理
const bgmPlayer=new Audio();
bgmPlayer.loop=true;
bgmPlayer.volume=0.7;

const DEFAULT_BGM="./bgm/bgm_stagebase.mp3";
const TITLE_BGM="./bgm/bgm_title.mp3";
const CLEAR_BGM="./bgm/bgm_clear.mp3";
const SE_BACK="./bgm/effect_back.mp3";
const SE_GO="./bgm/effect_go.mp3";

// キャラ画像読み込み
const playerImage=new Image();
playerImage.src="./img/chara_white.png";

// createObjectURL解放用
let currentPastObjectURL = null;
let currentPresentObjectURL = null;

let zoom=1;
let cellW=0;
let cellH=0;

// ステージクリア時関連
let endingActive=false;
let endingPhase=0;
let endingPhaseStart=0;
let gridAlpha=0.35;
let iconAlpha=1;
let presentAlpha=1;
let endingTextIndex=0;
// ステージ選択関連
let stageCursorX=0;
let stageCursorY=0;
stages.forEach(stage=>{
    stage.image=new Image();
    stage.image.src=stage.thumb;
});
// ステージカーソル移動関数
function moveStageCursor(dx,dy){
    stageCursorX=Math.max( 0,Math.min(STAGE_SELECT_COLS-1,stageCursorX+dx ) );
    stageCursorY=Math.max( 0,Math.min(STAGE_SELECT_ROWS-1,stageCursorY+dy ) );
}

const MIN_ZOOM = Math.min(
  VIEW_W / WORLD_W,
  VIEW_H / WORLD_H
);
// ステージグリッド数
const STAGE_SELECT_COLS=3;
const STAGE_SELECT_ROWS=2;

let showGrid=true;
let goalUnlocked=false;
let repairPhase=1;
let padDX=0,padDY=0;
let dialogOpen=false;
const keys={};

// Bダッシュを使用可能にする
let dashActive=false;

function markVisited(){
	const gx=Math.max(
	  0,
	  Math.min(currentStage.cols-1,Math.floor(player.x/cellW))
	);
	const gy=Math.max(
	  0,
	  Math.min(currentStage.rows-1,Math.floor(player.y/cellH))
	);
	visited.add(gx + "," + gy);
}

function isPanelPhase(){
    return(
        currentStage.gameType==="panel"
        ||
        (
            currentStage.gameType==="restoring"
            &&
            repairPhase===1
        )
    );
}
// 修復率（塗り絵・絵合わせ対応）
function paintRate(){
    const total=currentStage.cols*currentStage.rows;
	if(currentStage.gameType==="restoring"){
	    if(repairPhase===1){
	        return fixedPanels.size/total*100;
	    }
	    return visited.size/total*100;
	}
    if(isPanelPhase()){
        return fixedPanels.size/total*100;
    }
    return visited.size/total*100;
}

// イベント処理
function nearestEvent(){
	 let best=null,d=EVENT_DISTANCE;
	 for(const e of events){
		  if(e.type==="goal" && !goalUnlocked) continue;
		  const dist=Math.hypot(player.x-e.x,player.y-e.y);
		  if(dist<d){d=dist;best=e;}
	 }
	 return best;
}

function openEvent(){
	 const e=nearestEvent();
	 if(!e)return;
	 playSE(SE_GO);
	 e.read=true;
	 dlgTitle.textContent=e.title;
	 dlgText.textContent=e.text;
	 dialog.style.display="block";
	 dialogOpen=true;
}
function closeEvent(){
    dialog.style.display="none";
    dialogOpen=false;
    const e=nearestEvent();
    if(
        e &&
        e.type==="goal" &&
        goalUnlocked &&
        !endingActive
    ){
    	registerStageClear();
        endingActive=true;
        endingPhase=1;
        endingPhaseStart=performance.now();
    }
}

function selectPanel(){
    const gx=Math.max(0,Math.min(currentStage.cols-1,Math.floor(player.x/cellW)));
    const gy=Math.max(0,Math.min(currentStage.rows-1,Math.floor(player.y/cellH)));
    const panelIndex=gy*currentStage.cols+gx;
    selectPanelByIndex(panelIndex);
}

function selectPanelByIndex(panelIndex){
    if(selectedPanel===null){
        if(fixedPanels.has(panelIndex)){
            return;
        }
        selectedPanel=panelIndex;
        return;
    }
    if(selectedPanel===panelIndex){
        selectedPanel=null;
        return;
    }
    if(fixedPanels.has(panelIndex)){
        selectedPanel=null;
        return;
    }
    [panelState[selectedPanel],panelState[panelIndex]]=
    [panelState[panelIndex],panelState[selectedPanel]];
    updateFixedPanels();
    selectedPanel=null;
}

dialog.addEventListener("click",()=>{
    if(dialogOpen){
        closeEvent();
    }
});

cv.addEventListener("pointerdown",e=>{
    if(gameMode!=="game") return;
    if(!isPanelPhase()) return;
    if(dialogOpen) return;
	const rect=cv.getBoundingClientRect();
	const mx=(e.clientX-rect.left)*(VIEW_W/rect.width);
	const my=(e.clientY-rect.top)*(VIEW_H/rect.height);
    const srcW=VIEW_W/zoom;
    const srcH=VIEW_H/zoom;
    let sx,sy;
    if(srcW>=WORLD_W){
        sx=-(srcW-WORLD_W)/2;
    }else{
        sx=Math.max(0,Math.min(WORLD_W-srcW,player.x-srcW/2));
    }
    if(srcH>=WORLD_H){
        sy=-(srcH-WORLD_H)/2;
    }else{
        sy=Math.max(0,Math.min(WORLD_H-srcH,player.y-srcH/2));
    }
    const worldX=sx+(mx/zoom);
    const worldY=sy+(my/zoom);
    const gx=Math.max(
        0,
        Math.min(
            currentStage.cols-1,
            Math.floor(worldX/cellW)
        )
    );
    const gy=Math.max(
        0,
        Math.min(
            currentStage.rows-1,
            Math.floor(worldY/cellH)
        )
    );
    const panelIndex=gy*currentStage.cols+gx;
    selectPanelByIndex(panelIndex);
});

function drawStageSelect(){
    ctx.fillStyle="#111";
    ctx.fillRect(0,0,VIEW_W,VIEW_H);
    ctx.textAlign="center";
    ctx.fillStyle="#fff";
    ctx.font="32px sans-serif";
    ctx.fillText( GAME_TITLE, VIEW_W/2, 40 );
    // ステージサムネイルのサイズ
	const gridW=470;
	const gridH=240;
    const startX=(VIEW_W-gridW)/2;
    const startY=90;
    const cellW=gridW/STAGE_SELECT_COLS;
    const cellH=gridH/STAGE_SELECT_ROWS;
    for(let y=0;y<STAGE_SELECT_ROWS;y++){
        for(let x=0;x<STAGE_SELECT_COLS;x++){
            const px=startX+x*cellW;
            const py=startY+y*cellH;
            const selected=
                x===stageCursorX && y===stageCursorY;
            ctx.lineWidth=
                selected ? 4 : 1;
            ctx.strokeStyle=
                selected ? "#ff0" : "#888";
            ctx.strokeRect(px,py,cellW,cellH);
			const index = y*STAGE_SELECT_COLS+x;

			const stageData = stages[index];
			if(stageData){
			    if(
			        stageData.image.complete && stageData.image.naturalWidth>0
			    ){
			        ctx.drawImage( stageData.image, px+8, py+8, cellW-16, cellH-32 );
			    }
			    ctx.fillStyle="#fff";
			    ctx.font="16px sans-serif";
			    ctx.fillText( stageData.title, px+cellW/2, py+cellH-8 );
			}
        }
    }
    ctx.fillStyle="#fff";
    ctx.font="16px sans-serif";
    ctx.fillText("A : START",VIEW_W/2,VIEW_H-20);
    ctx.textAlign="left";
}

function drawMiniMap(){
	 miniCtx.fillStyle="#000";
	 miniCtx.fillRect(0,0,miniCtx.canvas.width,miniCtx.canvas.height);
	 const cellW=
	   miniCtx.canvas.width/currentStage.cols
	 const cellH=
	   miniCtx.canvas.height/currentStage.rows;
	 visited.forEach(key=>{
	   const [cx,cy]=
	     key.split(",").map(Number);
	   miniCtx.fillStyle="#0f0";
	   miniCtx.fillRect(cx*cellW,cy*cellH,cellW,cellH);
	 });

	// イベント描画
	for(const e of events){
	  	if(e.type==="goal" && !goalUnlocked) continue;
		const ex=Math.floor(
		  e.x/(WORLD_W/currentStage.cols)
		);
		const ey=Math.floor(
		  e.y/(WORLD_H/currentStage.rows)
		);
		miniCtx.fillStyle =
		    e.type==="goal"
		      ? "#0ff"
		      : (e.read ? "#666" : "#ff0");
		miniCtx.fillRect(ex*cellW,ey*cellH,cellW,cellH);
	}

	// プレイヤー描画（最後）
	const px=Math.max(
	  0,
	  Math.min(
	    currentStage.cols-1,
	    Math.floor(player.x/(WORLD_W/currentStage.cols))
	  )
	);

	const py=Math.max(
	  0,
	  Math.min(
	    currentStage.rows-1,
	    Math.floor(player.y/(WORLD_H/currentStage.rows))
	  )
	);
	miniCtx.fillStyle="#f00";
	miniCtx.fillRect(px*cellW,py*cellH,cellW,cellH);

	// 現在の視界枠
	const srcW = VIEW_W / zoom;
	const srcH = VIEW_H / zoom;
	let sx = Math.max( 0, Math.min( WORLD_W - srcW, player.x - srcW/2 ) );
	let sy = Math.max( 0, Math.min( WORLD_H - srcH, player.y - srcH/2 ) );
	miniCtx.strokeStyle="#fff";
	miniCtx.lineWidth=1;
	miniCtx.strokeRect(
	  sx/WORLD_W * miniCtx.canvas.width,
	  sy/WORLD_H * miniCtx.canvas.height,
	  srcW/WORLD_W * miniCtx.canvas.width,
	  srcH/WORLD_H * miniCtx.canvas.height
	);
}

function updateEnding(){
    if(!endingActive)return;
    const now=performance.now();
    const elapsed=now-endingPhaseStart;
    if(endingPhase===1){
        const t=Math.min(1,elapsed/ENDING_ZOOM_TIME);
        zoom = zoom + (MIN_ZOOM-zoom) * 0.05;
        if(t>=1){
            zoom=MIN_ZOOM;
            endingPhase=2;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===2){
        if(elapsed>=ENDING_WAIT_1){
            endingPhase=3;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===3){
        const t=Math.min(1,elapsed/ENDING_GRID_TIME);
        gridAlpha=0.35*(1-t);
        iconAlpha=1-t;
        if(t>=1){
            gridAlpha=0;
            iconAlpha=0;
            endingPhase=4;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===4){
        if(elapsed>=ENDING_WAIT_2){
        	playClearBGM();
            endingPhase=5;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===5){
        const t=Math.min(1,elapsed/ENDING_PRESENT_TIME);
        presentAlpha=1-t;
        if(t>=1){
            presentAlpha=0;
            endingPhase=6;
            endingPhaseStart=now;
        }
    }
    else if(endingPhase===6){
	    if(elapsed>=ENDING_WAIT_3){
	        endingTextIndex=0;
	        message.textContent="";
	        endingPhase=7;
	        endingPhaseStart=now;
	    }
	}
	else if(endingPhase===7){
	    const text = currentStage.endingMessage || "世界は、本来の姿を取り戻した。";
	    const count= 1 + Math.floor( elapsed / ENDING_TEXT_SPEED );
	    endingTextIndex=Math.min( text.length, count );
	    message.textContent=
	        text.slice(0,endingTextIndex);
	    if(endingTextIndex>=text.length){
	        endingPhase=8;
	    }
	}
}

function draw(){
    if(gameMode==="stageSelect"){
        drawStageSelect();
        statusText.textContent = "ステージを選択";
        backBtn.style.display="none";
        return;
    }
	const srcW=VIEW_W/zoom, srcH=VIEW_H/zoom;
	let sx,sy;
	if(srcW >= WORLD_W){
	   sx = -(srcW - WORLD_W)/2;
	}else{
	   sx = Math.max( 0, Math.min( WORLD_W-srcW, player.x-srcW/2 ) );
	}
	if(srcH >= WORLD_H){
	   sy = -(srcH - WORLD_H)/2;
	}else{
	   sy = Math.max( 0, Math.min( WORLD_H-srcH, player.y-srcH/2 ) );
	}
	ctx.clearRect(0,0,VIEW_W,VIEW_H);
	//スマホFirefox MP4マゼンダ実験
	//ctx.fillStyle="magenta";
	//ctx.fillRect(0,0,VIEW_W,VIEW_H);

	//現在画像
	const source = bgPresent;
	let mediaW = 0;
	let mediaH = 0;
	let canDraw = false;
	if(source instanceof HTMLImageElement){
		canDraw = source.complete && source.naturalWidth > 0;
		mediaW = source.width;
		mediaH = source.height;
	}
	if(source instanceof HTMLVideoElement){
		canDraw = source.readyState >= 2;
		mediaW = source.videoWidth;
		mediaH = source.videoHeight;
	}
	if(canDraw){

		const pastMediaW =
		    bgPast instanceof HTMLVideoElement
		        ? bgPast.videoWidth
		        : bgPast.width;

		const pastMediaH =
		    bgPast instanceof HTMLVideoElement
		        ? bgPast.videoHeight
		        : bgPast.height;

		ctx.drawImage(
		    bgPast,
		    sx/WORLD_W*pastMediaW,
		    sy/WORLD_H*pastMediaH,
		    srcW/WORLD_W*pastMediaW,
		    srcH/WORLD_H*pastMediaH,
		    0,
		    0,
		    VIEW_W,
		    VIEW_H
		);

		ctx.save();
		ctx.globalAlpha=presentAlpha;
		if(isPanelPhase()){
		    const panelCols=currentStage.cols;
		    const panelRows=currentStage.rows;
		    const panelWorldW=WORLD_W/panelCols;
		    const panelWorldH=WORLD_H/panelRows;
		    for(let gy=0;gy<panelRows;gy++){
		        for(let gx=0;gx<panelCols;gx++){
		            const destIndex=gy*panelCols+gx;
		            const sourceIndex=panelState[destIndex];
		            const srcGX=sourceIndex%panelCols;
		            const srcGY=Math.floor(sourceIndex/panelCols);

					if(fixedPanels.has(destIndex)){
					    if(currentStage.gameType==="restoring"){
					        ctx.drawImage(
					            presentCanvas,
					            srcGX*panelWorldW,
					            srcGY*panelWorldH,
					            panelWorldW,
					            panelWorldH,
					            (gx*panelWorldW-sx)*zoom,
					            (gy*panelWorldH-sy)*zoom,
					            panelWorldW*zoom,
					            panelWorldH*zoom
					        );
					    }else{
					        const pastMediaW=
					            bgPast instanceof HTMLVideoElement
					                ? bgPast.videoWidth
					                : bgPast.width;
					        const pastMediaH=
					            bgPast instanceof HTMLVideoElement
					                ? bgPast.videoHeight
					                : bgPast.height;
					        ctx.drawImage(
					            bgPast,
					            srcGX*(pastMediaW/panelCols),
					            srcGY*(pastMediaH/panelRows),
					            pastMediaW/panelCols,
					            pastMediaH/panelRows,
					            (gx*panelWorldW-sx)*zoom,
					            (gy*panelWorldH-sy)*zoom,
					            panelWorldW*zoom,
					            panelWorldH*zoom
					        );
					    }
					}else{
					    ctx.drawImage(
					        presentCanvas,
					        srcGX*panelWorldW,
					        srcGY*panelWorldH,
					        panelWorldW,
					        panelWorldH,
					        (gx*panelWorldW-sx)*zoom,
					        (gy*panelWorldH-sy)*zoom,
					        panelWorldW*zoom,
					        panelWorldH*zoom
					    );
					}
		        }
		    }
		}else{
		    ctx.drawImage(presentCanvas,sx,sy,srcW,srcH,0,0,VIEW_W,VIEW_H);
		}
		ctx.restore();
	}else{
		    ctx.fillStyle="#567";
		    ctx.fillRect(0,0,VIEW_W,VIEW_H);
	}
	// グリッド罫線表示
	if(showGrid){
		ctx.strokeStyle=`rgba(255,255,255,${gridAlpha})`;
		ctx.lineWidth=1;
		const cellWorldW = cellW;
		const cellWorldH = cellH;
	   /* 縦線 */
	   const startGX = Math.floor(sx / cellWorldW);
	   const endGX   = Math.ceil((sx + srcW) / cellWorldW);
	   for(let gx=startGX; gx<=endGX; gx++){
	      const worldX  = gx * cellWorldW;
	      const screenX = (worldX - sx) * zoom;
	      ctx.beginPath();
	      ctx.moveTo(screenX,0);
	      ctx.lineTo(screenX,VIEW_H);
	      ctx.stroke();
	   }
	   /* 横線 */
	   const startGY = Math.floor(sy / cellWorldH);
	   const endGY   = Math.ceil((sy + srcH) / cellWorldH);
	   for(let gy=startGY; gy<=endGY; gy++){
	      const worldY  = gy * cellWorldH;
	      const screenY = (worldY - sy) * zoom;
	      ctx.beginPath();
	      ctx.moveTo(0,screenY);
	      ctx.lineTo(VIEW_W,screenY);
	      ctx.stroke();
	   }
	}

	//イベントアイコン表示
	ctx.save();
	ctx.globalAlpha=iconAlpha;
	ctx.fillStyle="#fff";
	for(const e of events){
	    if(e.type==="goal" && !goalUnlocked) continue;
	    const ex=(e.x-sx)*zoom;
	    const ey=(e.y-sy)*zoom;
	    ctx.font="20px sans-serif";
	    ctx.fillText(
	        e.type==="goal"
	            ? "🏁"
	            : (e.read?"✓":"▼"),
	        ex,
	        ey
	    );
	}
	ctx.restore();

	if(isPanelPhase()){
	    const gx=Math.max(0,Math.min(currentStage.cols-1,Math.floor(player.x/cellW)));
	    const gy=Math.max(0,Math.min(currentStage.rows-1,Math.floor(player.y/cellH)));
	    ctx.save();
		ctx.globalAlpha=iconAlpha;
	    ctx.strokeStyle="#ff0";
	    ctx.lineWidth=3;
	    ctx.strokeRect( (gx*cellW-sx)*zoom, (gy*cellH-sy)*zoom, cellW*zoom, cellH*zoom );
	    ctx.restore();

		//fixedパネルを緑枠で表示
		ctx.save();
		ctx.globalAlpha=iconAlpha;
		for(const fixedIndex of fixedPanels){
		    const fx=fixedIndex%currentStage.cols;
		    const fy=Math.floor(fixedIndex/currentStage.cols);
		    ctx.strokeStyle="#0f0";
		    ctx.lineWidth=3;
		    ctx.strokeRect( (fx*cellW-sx)*zoom, (fy*cellH-sy)*zoom, cellW*zoom, cellH*zoom );
		}
		ctx.restore();
		
		//選択パネルを赤枠で表示
		ctx.save();
		ctx.globalAlpha=iconAlpha;
		if(selectedPanel!==null){
		    const sxPanel=selectedPanel%currentStage.cols;
		    const syPanel=Math.floor(selectedPanel/currentStage.cols);
		    ctx.strokeStyle="#f00";
		    ctx.lineWidth=4;
		    ctx.strokeRect( (sxPanel*cellW-sx)*zoom, (syPanel*cellH-sy)*zoom, cellW*zoom, cellH*zoom );
		}
		ctx.restore();
	}

	// 主人公キャラ描画
	const px=Math.max( 8, Math.min( VIEW_W-8, (player.x-sx)*zoom ) );
	const py=Math.max( 8, Math.min( VIEW_H-8, (player.y-sy)*zoom ) );
	ctx.save();
	ctx.globalAlpha=iconAlpha;

	if(USE_CHARACTER_IMAGE){
	    const darkness=Math.min(1,clearedStages.size*0.2);
	    ctx.filter=`brightness(${1-darkness})`;
	    ctx.drawImage(playerImage,px-CHARACTER_SIZE/2,py-CHARACTER_SIZE/2,CHARACTER_SIZE,CHARACTER_SIZE);
	    ctx.filter="none";
	}else{
	    ctx.fillStyle="red";
	    ctx.beginPath();
	    ctx.arc(px,py,8,0,Math.PI*2);
	    ctx.fill();
	}

	ctx.restore();
	
	const rate=paintRate();
	const rateLabel=
    isPanelPhase()
        ? GAME_JOINRATE
        : GAME_REPAIRRATE;

	if(
	    (
	        currentStage.gameType==="paint"
	        ||
	        (
	            currentStage.gameType==="restoring"
	            &&
	            repairPhase===2
	        )
	    )
	    &&
	    rate>=currentStage.clearRate
	){
	    goalUnlocked=true;
	}

	drawMiniMap();
	const gx=Math.max( 0, Math.min( currentStage.cols-1, Math.floor(player.x/cellW) ) );
	const gy=Math.max( 0, Math.min( currentStage.rows-1, Math.floor(player.y/cellH) ) );
	statusText.innerHTML =
	`<span class="stageTitle">${currentStage.title}</span>　Mission：${currentStage.goalCondition}　${rateLabel}：${rate.toFixed(1)}%`;
	backBtn.style.display="inline-block"; // ステージ選択画面に戻る
	gridPos.innerHTML =
	`x${gx},y${gy}  Zoom:${zoom.toFixed(1)}<br>X:${Math.floor(player.x)} Y:${Math.floor(player.y)}`;
	if(!endingActive){
	    if(isPanelPhase()){
	        message.textContent = "パネルを交換して修復しよう";
	    }else{
	        message.textContent=
	            goalUnlocked
	              ? "🏁 ゴール解放！"
	              : "石碑を調べながら塗ろう";
	    }
	}
}

function loop(){
	 if(!dialogOpen){
		  let dx=padDX,dy=padDY;
		  if(keys.arrowup)dy--;
		  if(keys.arrowdown)dy++;
		  if(keys.arrowleft)dx--;
		  if(keys.arrowright)dx++;

		  if(dx||dy){
			    const len=Math.hypot(dx,dy);
			    dx/=len; dy/=len;
			    const ox=player.x, oy=player.y;
				// 移動速度
				const currentSpeed=
				  PLAYER_SPEED *
				  (dashActive ? DASH_MULTIPLIER : 1);
				player.x=Math.max(
				  0,
				  Math.min(
				    WORLD_W,
				    player.x+dx*currentSpeed
				  )
				);
				player.y=Math.max(
				  0,
				  Math.min(
				    WORLD_H,
				    player.y+dy*currentSpeed
				  )
				);
				
				// panelフェーズでは軌跡を残さない
				if(!isPanelPhase()){
				    presentCtx.save();
				    presentCtx.globalCompositeOperation=
				        "destination-out";
				    presentCtx.strokeStyle="#000";
				    presentCtx.lineWidth=RESTORE_BRUSH_SIZE;
				    presentCtx.lineCap="round";
				    presentCtx.beginPath();
				    presentCtx.moveTo(ox,oy);
				    presentCtx.lineTo(player.x,player.y);
				    presentCtx.stroke();
				    presentCtx.restore();
				}
				// グリッド訪問処理（プレイヤーが一度でも通過したグリッドを訪問済みとして記録）
			    markVisited();
		  }
	 }

	if(
	    currentStage.gameType==="restoring"
	    &&
	    repairPhase===1
	    &&
	    fixedPanels.size===panelState.length
	){
	    repairPhase=2;

	    visited.clear();
	    markVisited();

	    buildEvents();
	}
	else if(
	    isPanelPhase() &&
	    !endingActive &&
	    paintRate()>=100
	){
	    registerStageClear();
	    endingActive=true;
	    endingPhase=1;
	    endingPhaseStart=performance.now();
	}
	updateEnding();
	draw();
	requestAnimationFrame(loop);
}
//↑↓←→  移動

addEventListener("keydown",e=>{
    if(!pressOpened){
        showTitlePanel();
        return;
    }
    if(isTitlePanelOpen()){
        return;
    }
	const key=e.key.toLowerCase();
	keys[key]=true;
	if(gameMode==="stageSelect"){
	    if(bgmPlayer.paused){
	        playTitleBGM();
	    }	
	    if(key==="arrowleft"){
	        moveStageCursor(-1,0);
	    }
	    if(key==="arrowright"){
	        moveStageCursor(1,0);
	    }
	    if(key==="arrowup"){
	        moveStageCursor(0,-1);
	    }
	    if(key==="arrowdown"){
	        moveStageCursor(0,1);
	    }
	}
	if(
	    e.key===" " || key==="j" || key==="a"
	){
		if(gameMode==="stageSelect"){
			const index=
			    stageCursorY*STAGE_SELECT_COLS+
			    stageCursorX;
				const stageData=stages[index];
				if(stageData){
				    currentStageIndex=index;
				    loadStage(stageData);
				    gameMode="game";
				}
		    return;
		}
	    if(isPanelPhase()){
	        selectPanel();
	        return;
	    }
	    if(dialogOpen){
	        closeEvent();
	    }else{
	        openEvent();
	    }
	}
	if(key==="b"){
	     if(dialogOpen){
	          closeEvent();
	     }else{
	          dashActive=true;
	     }
	}
	if(
	    dialogOpen && e.key==="Enter"
	){
	    closeEvent();
	}
});
addEventListener("keyup",e=>{
	 const key=e.key.toLowerCase();
	 delete keys[key];
	 if(key==="b"){
		  dashActive=false;
	 }
});

});

// 画像ファイル指定
loadPastBtn.onclick=()=>{
    loadTarget="past";
    filePicker.click();
};

loadPresentBtn.onclick=()=>{
    loadTarget="present";
    filePicker.click();
};
filePicker.onchange=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const url=URL.createObjectURL(f);
    // メモリ解放
    if(loadTarget==="past"){
	    if(currentPastObjectURL){
	        URL.revokeObjectURL(currentPastObjectURL);
	    }
	    currentPastObjectURL=url;
	}else{
	    if(currentPresentObjectURL){
	        URL.revokeObjectURL(currentPresentObjectURL);
	    }
	    currentPresentObjectURL=url;
	}
    
    // 過去LOAD
    if(loadTarget==="past"){
        if(/\.(mp4|webm)$/i.test(f.name)){
            const video=document.createElement("video");
            video.src=url;
            video.loop=true;
            video.muted=true;
            video.playsInline=true;
            video.addEventListener("loadeddata",()=>{
                video.play().catch(()=>{});
                bgPast=video;
            });
        }else{
            const img=new Image();
            img.onload=()=>{
                bgPast=img;
            };
            img.src=url;
        }
        return;
    }
    // 現在LOAD
    const img=new Image();
	img.onload=()=>{
	    bgPresent=img;
		presentCtx.clearRect(0,0,WORLD_W,WORLD_H);
		presentCtx.drawImage(bgPresent,0,0,WORLD_W,WORLD_H);
	};
    img.src=url;
};

        window.innerHeight / 480
    ) * 0.95;
    game.style.transform = `scale(${scale})`;
    game.style.transformOrigin = "center center";
}
